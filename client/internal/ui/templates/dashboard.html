<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultSync Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: #16213e;
            border-bottom: 1px solid #2a2a4a;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        header .subtitle {
            font-size: 12px;
            color: #888;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #aaa;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            vertical-align: middle;
        }

        .dot-green { background: #00d26a; box-shadow: 0 0 6px #00d26a88; }
        .dot-red { background: #f24c4c; box-shadow: 0 0 6px #f24c4c88; }
        .dot-amber { background: #f0c040; box-shadow: 0 0 6px #f0c04088; }

        .sync-btn {
            background: #0f62fe;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sync-btn:hover { background: #0043ce; }

        .sync-btn:disabled {
            background: #2a2a4a;
            color: #666;
            cursor: not-allowed;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .status-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .card {
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 14px 16px;
        }

        .card-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 6px;
        }

        .card-value {
            font-size: 16px;
            font-weight: 600;
        }

        .card-detail {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .error-banner {
            background: #3a1c1c;
            border: 1px solid #f24c4c44;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #f24c4c;
            display: none;
        }

        /* Two-panel file browser */
        .file-browser {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .panel {
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid #2a2a4a;
            background: #1a2444;
        }

        .panel-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8899bb;
            font-weight: 600;
        }

        .panel-subtitle {
            font-size: 11px;
            color: #556;
            margin-top: 2px;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .file-list {
            max-height: 480px;
            overflow-y: auto;
        }

        .file-row {
            padding: 10px 16px;
            border-bottom: 1px solid #1e2a4a;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            transition: background 0.15s;
        }

        .file-row:last-child { border-bottom: none; }
        .file-row:hover { background: #1e2a4a; }

        .file-icon {
            font-size: 14px;
            flex-shrink: 0;
            width: 18px;
            text-align: center;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-path {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #d0d8f0;
        }

        .file-meta {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .badge-synced { background: #0d3b2e; color: #00d26a; border: 1px solid #00d26a44; }
        .badge-conflict { background: #3b2e0d; color: #f0c040; border: 1px solid #f0c04044; }
        .badge-local { background: #0d1e3b; color: #4d9eff; border: 1px solid #4d9eff44; }
        .badge-server { background: #2e0d3b; color: #c080ff; border: 1px solid #c080ff44; }

        .device-heading {
            padding: 8px 16px 4px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8899bb;
            font-weight: 700;
            background: #1a2444;
            border-bottom: 1px solid #2a2a4a;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .device-group {
            border-bottom: 2px solid #2a2a4a;
        }

        .file-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .btn {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-push {
            background: #0d2244;
            color: #4d9eff;
            border-color: #4d9eff44;
        }
        .btn-push:hover:not(:disabled) { background: #1a3366; border-color: #4d9eff; }

        .btn-pull {
            background: #2a0d44;
            color: #c080ff;
            border-color: #c080ff44;
        }
        .btn-pull:hover:not(:disabled) { background: #3a1a66; border-color: #c080ff; }

        .btn-delete {
            background: #2a0d0d;
            color: #f24c4c;
            border-color: #f24c4c33;
        }
        .btn-delete:hover:not(:disabled) { background: #3a1a1a; border-color: #f24c4c; }

        .feedback-ok {
            font-size: 11px;
            color: #00d26a;
            padding: 2px 0;
        }

        .feedback-err {
            font-size: 11px;
            color: #f24c4c;
            padding: 2px 0;
        }

        .empty-state {
            padding: 32px 24px;
            text-align: center;
            color: #556;
            font-size: 13px;
        }

        .loading-state {
            padding: 24px;
            text-align: center;
            color: #556;
            font-size: 13px;
            font-style: italic;
        }

        /* Activity log */
        .activity-section h2 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 12px;
        }

        .activity-log {
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .activity-entry {
            padding: 8px 16px;
            border-bottom: 1px solid #1e2a4a;
            display: flex;
            gap: 12px;
            font-size: 12px;
        }

        .activity-entry:last-child { border-bottom: none; }

        .activity-time {
            color: #555;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 11px;
            white-space: nowrap;
            min-width: 80px;
        }

        .activity-msg {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 11px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>VaultSync</h1>
            <div class="subtitle">File Browser</div>
        </div>
        <div class="header-right">
            <div class="connection-status">
                <span id="conn-dot" class="dot dot-red"></span>
                <span id="conn-text">Disconnected</span>
            </div>
            <button id="sync-btn" class="sync-btn" onclick="forceSync()">Full Sync</button>
        </div>
    </header>

    <main>
        <div id="error-banner" class="error-banner"></div>

        <div class="status-cards">
            <div class="card">
                <div class="card-label">Connection</div>
                <div class="card-value">
                    <span id="status-conn-dot" class="dot dot-red"></span>
                    <span id="status-conn-text">Disconnected</span>
                </div>
            </div>
            <div class="card">
                <div class="card-label">Sync Status</div>
                <div class="card-value">
                    <span id="sync-dot" class="dot dot-green"></span>
                    <span id="sync-text">Idle</span>
                </div>
            </div>
            <div class="card">
                <div class="card-label">Synced Files</div>
                <div class="card-value" id="total-files">0</div>
                <div class="card-detail" id="total-size">0 B</div>
            </div>
            <div class="card">
                <div class="card-label">Last Sync</div>
                <div class="card-value" id="last-sync-time">Never</div>
                <div class="card-detail" id="last-sync-detail"></div>
            </div>
        </div>

        <div class="file-browser">
            <!-- Left panel: local files -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">Local</div>
                    <div class="panel-subtitle" id="local-path">~/VaultDrive</div>
                </div>
                <div class="file-list" id="local-file-list">
                    <div class="loading-state">Loading...</div>
                </div>
            </div>

            <!-- Right panel: server files -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">Server</div>
                    <div class="panel-subtitle">Remote storage</div>
                </div>
                <div class="file-list" id="server-file-list">
                    <div class="loading-state">Loading...</div>
                </div>
            </div>
        </div>

        <div class="activity-section">
            <h2>Activity Log</h2>
            <div id="activity-log" class="activity-log">
                <div class="empty-state">No activity yet</div>
            </div>
        </div>
    </main>

    <script>
        // ---- global state ----
        var operationInFlight = false;
        var currentDeviceName = '';

        // ---- helpers ----

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML.replace(/"/g, '&quot;');
        }

        function formatSize(bytes) {
            if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
            if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
            if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return bytes + ' B';
        }

        function timeAgo(dateStr) {
            var now = new Date();
            var then = new Date(dateStr);
            var seconds = Math.floor((now - then) / 1000);
            if (seconds < 5) return 'just now';
            if (seconds < 60) return seconds + 's ago';
            var minutes = Math.floor(seconds / 60);
            if (minutes < 60) return minutes + 'm ago';
            var hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + 'h ago';
            return Math.floor(hours / 24) + 'd ago';
        }

        function formatTime(dateStr) {
            var d = new Date(dateStr);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function fileIcon(relPath) {
            var ext = relPath.split('.').pop().toLowerCase();
            var icons = {
                'pdf': '\uD83D\uDCCB',
                'doc': '\uD83D\uDCDD', 'docx': '\uD83D\uDCDD',
                'xls': '\uD83D\uDCCA', 'xlsx': '\uD83D\uDCCA',
                'ppt': '\uD83D\uDCCA', 'pptx': '\uD83D\uDCCA',
                'jpg': '\uD83D\uDDBC', 'jpeg': '\uD83D\uDDBC',
                'png': '\uD83D\uDDBC', 'gif': '\uD83D\uDDBC', 'svg': '\uD83D\uDDBC',
                'mp4': '\uD83C\uDFA5', 'mov': '\uD83C\uDFA5', 'avi': '\uD83C\uDFA5',
                'mp3': '\uD83C\uDFB5', 'flac': '\uD83C\uDFB5', 'wav': '\uD83C\uDFB5',
                'zip': '\uD83D\uDCE6', 'tar': '\uD83D\uDCE6', 'gz': '\uD83D\uDCE6',
                'go': '\uD83D\uDCBB', 'js': '\uD83D\uDCBB', 'ts': '\uD83D\uDCBB',
                'py': '\uD83D\uDCBB', 'sh': '\uD83D\uDCBB', 'rs': '\uD83D\uDCBB',
                'txt': '\uD83D\uDCC4', 'md': '\uD83D\uDCC4', 'log': '\uD83D\uDCC4'
            };
            return icons[ext] || '\uD83D\uDCC4';
        }

        // ---- disable/enable all action buttons ----

        function setButtonsDisabled(disabled) {
            var btns = document.querySelectorAll('.btn');
            btns.forEach(function(b) { b.disabled = disabled; });
        }

        // ---- file list join and render ----

        function computeStatus(localMap, serverMap, relPath) {
            var inLocal = localMap.hasOwnProperty(relPath);
            var inServer = serverMap.hasOwnProperty(relPath);
            if (inLocal && inServer) {
                if (localMap[relPath].hash === serverMap[relPath].hash) {
                    return 'synced';
                }
                return 'conflict';
            }
            if (inLocal) return 'local-only';
            return 'server-only';
        }

        function badgeHtml(status) {
            switch (status) {
                case 'synced':    return '<span class="badge badge-synced">synced</span>';
                case 'conflict':  return '<span class="badge badge-conflict">conflict</span>';
                case 'local-only': return '<span class="badge badge-local">local only</span>';
                case 'server-only': return '<span class="badge badge-server">server only</span>';
            }
            return '';
        }

        function makeBtn(cls, label, action, relPath, deviceId) {
            var deviceAttr = deviceId ? ' data-device="' + escapeHtml(deviceId) + '"' : '';
            return '<button class="btn ' + cls + '" data-action="' + action + '" data-path="' + escapeHtml(relPath) + '"' + deviceAttr + '>' + label + '</button>';
        }

        function renderLocalRow(f, status) {
            var actions = '';
            if (status === 'local-only' || status === 'conflict') {
                actions += makeBtn('btn-push', 'Push \u2192', 'upload', f.rel_path);
            }
            actions += makeBtn('btn-delete', 'Delete', 'delete-client', f.rel_path);

            return '<div class="file-row">' +
                '<span class="file-icon">' + fileIcon(f.rel_path) + '</span>' +
                '<div class="file-info">' +
                    '<div class="file-path" title="' + escapeHtml(f.rel_path) + '">' + escapeHtml(f.rel_path) + '</div>' +
                    '<div class="file-meta">' + f.size_human + ' \u00B7 ' + badgeHtml(status) + '</div>' +
                '</div>' +
                '<div class="file-actions">' + actions + '</div>' +
                '</div>';
        }

        function groupByDevice(serverFiles) {
            var groups = {};
            serverFiles.forEach(function(f) {
                var device = f.device_id || 'Unknown Device';
                if (!groups.hasOwnProperty(device)) groups[device] = [];
                groups[device].push(f);
            });
            return groups;
        }

        function renderServerFileRow(f, localMap, device, isMine) {
            var actions = '';
            var alreadyLocal = localMap.hasOwnProperty(f.rel_path) && localMap[f.rel_path].hash === f.hash;
            if (!alreadyLocal) {
                actions += makeBtn('btn-pull', 'Pull here', 'pull-device', f.rel_path, device);
            }
            if (isMine) {
                actions += makeBtn('btn-delete', 'Remove', 'delete-server', f.rel_path);
            }
            var localBadge = alreadyLocal ? ' \u00B7 <span class="badge badge-synced">local copy</span>' : '';

            return '<div class="file-row">' +
                '<span class="file-icon">' + fileIcon(f.rel_path) + '</span>' +
                '<div class="file-info">' +
                    '<div class="file-path" title="' + escapeHtml(f.rel_path) + '">' + escapeHtml(f.rel_path) + '</div>' +
                    '<div class="file-meta">' + f.size_human + localBadge + '</div>' +
                '</div>' +
                '<div class="file-actions">' + actions + '</div>' +
                '</div>';
        }

        function renderServerGroups(serverFiles, localMap) {
            if (!serverFiles || serverFiles.length === 0) {
                return '<div class="empty-state">No server files</div>';
            }
            var groups = groupByDevice(serverFiles);
            var deviceNames = Object.keys(groups).sort(function(a, b) {
                if (a === currentDeviceName) return -1;
                if (b === currentDeviceName) return 1;
                return a < b ? -1 : a > b ? 1 : 0;
            });
            var html = '';
            deviceNames.forEach(function(device) {
                var isMine = (device === currentDeviceName);
                html += '<div class="device-group">';
                html += '<div class="device-heading">' + escapeHtml(device) + '</div>';
                groups[device].forEach(function(f) {
                    html += renderServerFileRow(f, localMap, device, isMine);
                });
                html += '</div>';
            });
            return html;
        }

        function renderFileLists(clientFiles, serverFiles) {
            // Build maps keyed by rel_path
            var localMap = {};
            clientFiles.forEach(function(f) { localMap[f.rel_path] = f; });
            var serverMap = {};
            serverFiles.forEach(function(f) { serverMap[f.rel_path] = f; });

            // Collect all unique rel_paths, sorted alphabetically (for local panel)
            var allPaths = Object.keys(localMap).concat(
                Object.keys(serverMap).filter(function(p) { return !localMap.hasOwnProperty(p); })
            ).sort();

            var localHtml = '';

            allPaths.forEach(function(relPath) {
                var status = computeStatus(localMap, serverMap, relPath);

                if (localMap.hasOwnProperty(relPath)) {
                    localHtml += renderLocalRow(localMap[relPath], status);
                }
            });

            var localList = document.getElementById('local-file-list');
            var serverList = document.getElementById('server-file-list');

            localList.innerHTML = localHtml || '<div class="empty-state">No local files</div>';
            serverList.innerHTML = renderServerGroups(serverFiles, localMap);

            // Re-apply disabled state if an operation is in flight
            if (operationInFlight) {
                setButtonsDisabled(true);
            }
        }

        // ---- file list refresh ----

        async function refreshFileLists() {
            try {
                var results = await Promise.all([
                    fetch('/api/files/client').then(function(r) { return r.json(); }),
                    fetch('/api/files/server').then(function(r) { return r.json(); })
                ]);
                var clientFiles = (results[0].files || []).slice().sort(function(a, b) {
                    return a.rel_path < b.rel_path ? -1 : a.rel_path > b.rel_path ? 1 : 0;
                });
                var serverFiles = (results[1].files || []).slice().sort(function(a, b) {
                    return a.rel_path < b.rel_path ? -1 : a.rel_path > b.rel_path ? 1 : 0;
                });
                renderFileLists(clientFiles, serverFiles);
            } catch (e) {
                // Silently ignore network errors during polling
            }
        }

        // ---- status polling ----

        function updateStatus(data) {
            if (data.device_name) currentDeviceName = data.device_name;

            // Header connection dot
            var connDot = document.getElementById('conn-dot');
            var connText = document.getElementById('conn-text');
            connDot.className = 'dot ' + (data.connected ? 'dot-green' : 'dot-red');
            connText.textContent = data.connected ? 'Connected' : 'Disconnected';

            // Status card: connection
            var scDot = document.getElementById('status-conn-dot');
            var scText = document.getElementById('status-conn-text');
            scDot.className = 'dot ' + (data.connected ? 'dot-green' : 'dot-red');
            scText.textContent = data.connected ? 'Connected' : 'Disconnected';

            // Status card: sync status
            var syncDot = document.getElementById('sync-dot');
            var syncText = document.getElementById('sync-text');
            if (data.syncing) {
                syncDot.className = 'dot dot-amber';
                syncText.textContent = 'Syncing...';
            } else {
                syncDot.className = 'dot dot-green';
                syncText.textContent = 'Idle';
            }

            // Storage stats
            document.getElementById('total-files').textContent = data.total_files;
            document.getElementById('total-size').textContent = formatSize(data.total_size);

            // Last sync
            var lastTime = document.getElementById('last-sync-time');
            var lastDetail = document.getElementById('last-sync-detail');
            if (data.last_sync_time && data.last_sync_time !== '0001-01-01T00:00:00Z') {
                lastTime.textContent = timeAgo(data.last_sync_time);
                lastDetail.textContent =
                    '\u2191' + data.last_sync_uploaded +
                    ' \u2193' + data.last_sync_downloaded +
                    ' \u2717' + data.last_sync_deleted;
            } else {
                lastTime.textContent = 'Never';
                lastDetail.textContent = '';
            }

            // Error banner
            var banner = document.getElementById('error-banner');
            if (data.last_sync_error) {
                banner.textContent = data.last_sync_error;
                banner.style.display = 'block';
            } else {
                banner.style.display = 'none';
            }

            // Full sync button: disabled while syncing
            document.getElementById('sync-btn').disabled = data.syncing;

            // Activity log
            var log = document.getElementById('activity-log');
            if (!data.activities || data.activities.length === 0) {
                log.innerHTML = '<div class="empty-state">No activity yet</div>';
            } else {
                log.innerHTML = data.activities.map(function(a) {
                    return '<div class="activity-entry">' +
                        '<span class="activity-time">' + formatTime(a.time) + '</span>' +
                        '<span class="activity-msg">' + escapeHtml(a.message) + '</span>' +
                        '</div>';
                }).join('');
            }
        }

        async function fetchStatus() {
            try {
                var resp = await fetch('/api/status');
                if (!resp.ok) return;
                var data = await resp.json();
                updateStatus(data);
            } catch (e) {
                // UI server itself is down — handle gracefully
            }
        }

        // ---- per-file operations ----

        // Show inline feedback on the row containing the clicked button
        function showFeedback(btn, msg, isError) {
            var row = btn.closest('.file-row');
            if (!row) return;
            var existing = row.querySelector('.feedback-ok, .feedback-err');
            if (existing) existing.remove();
            var span = document.createElement('span');
            span.className = isError ? 'feedback-err' : 'feedback-ok';
            span.textContent = msg;
            var actions = row.querySelector('.file-actions');
            if (actions) actions.appendChild(span);
            // Auto-remove after 3s
            setTimeout(function() { if (span.parentNode) span.remove(); }, 3000);
        }

        async function doUpload(relPath, btn) {
            if (operationInFlight) return;
            operationInFlight = true;
            var origText = btn.textContent;
            btn.textContent = '...';
            setButtonsDisabled(true);
            try {
                var resp = await fetch('/api/files/upload?path=' + encodeURIComponent(relPath), { method: 'POST' });
                var data = await resp.json();
                if (data.ok) {
                    showFeedback(btn, 'Pushed', false);
                    await refreshFileLists();
                    await fetchStatus();
                } else {
                    showFeedback(btn, data.message || 'Upload failed', true);
                }
            } catch (e) {
                showFeedback(btn, 'Network error', true);
            } finally {
                operationInFlight = false;
                btn.textContent = origText;
                setButtonsDisabled(false);
            }
        }

        async function doDownload(relPath, btn) {
            if (operationInFlight) return;
            operationInFlight = true;
            var origText = btn.textContent;
            btn.textContent = '...';
            setButtonsDisabled(true);
            try {
                var resp = await fetch('/api/files/download?path=' + encodeURIComponent(relPath), { method: 'POST' });
                var data = await resp.json();
                if (data.ok) {
                    showFeedback(btn, 'Pulled', false);
                    await refreshFileLists();
                    await fetchStatus();
                } else {
                    showFeedback(btn, data.message || 'Download failed', true);
                }
            } catch (e) {
                showFeedback(btn, 'Network error', true);
            } finally {
                operationInFlight = false;
                btn.textContent = origText;
                setButtonsDisabled(false);
            }
        }

        async function doDevicePull(relPath, device, btn) {
            if (operationInFlight) return;
            operationInFlight = true;
            var origText = btn.textContent;
            btn.textContent = '...';
            setButtonsDisabled(true);
            try {
                var resp = await fetch('/api/files/pull?path=' + encodeURIComponent(relPath) + '&from=' + encodeURIComponent(device), { method: 'POST' });
                var data = await resp.json();
                if (data.ok) {
                    showFeedback(btn, 'Pulled', false);
                    await refreshFileLists();
                    await fetchStatus();
                } else {
                    showFeedback(btn, data.message || 'Pull failed', true);
                }
            } catch (e) {
                showFeedback(btn, 'Network error', true);
            } finally {
                operationInFlight = false;
                btn.textContent = origText;
                setButtonsDisabled(false);
            }
        }

        async function doDeleteServer(relPath, btn) {
            if (operationInFlight) return;
            if (!confirm('Delete "' + relPath + '" from server and local disk? Other devices\' copies are not affected.')) return;
            operationInFlight = true;
            var origText = btn.textContent;
            btn.textContent = '...';
            setButtonsDisabled(true);
            try {
                var resp = await fetch('/api/files/server?path=' + encodeURIComponent(relPath), { method: 'DELETE' });
                var data = await resp.json();
                if (data.ok) {
                    showFeedback(btn, 'Deleted', false);
                    await refreshFileLists();
                    await fetchStatus();
                } else {
                    showFeedback(btn, data.message || 'Delete failed', true);
                }
            } catch (e) {
                showFeedback(btn, 'Network error', true);
            } finally {
                operationInFlight = false;
                btn.textContent = origText;
                setButtonsDisabled(false);
            }
        }

        async function doDeleteClient(relPath, btn) {
            if (operationInFlight) return;
            if (!confirm('Delete "' + relPath + '" from local storage?')) return;
            operationInFlight = true;
            var origText = btn.textContent;
            btn.textContent = '...';
            setButtonsDisabled(true);
            try {
                var resp = await fetch('/api/files/client?path=' + encodeURIComponent(relPath), { method: 'DELETE' });
                var data = await resp.json();
                if (data.ok) {
                    showFeedback(btn, 'Deleted', false);
                    await refreshFileLists();
                    await fetchStatus();
                } else {
                    showFeedback(btn, data.message || 'Delete failed', true);
                }
            } catch (e) {
                showFeedback(btn, 'Network error', true);
            } finally {
                operationInFlight = false;
                btn.textContent = origText;
                setButtonsDisabled(false);
            }
        }

        // ---- delegated click handler for file action buttons ----

        document.addEventListener('click', function(e) {
            var btn = e.target.closest('.btn[data-action]');
            if (!btn) return;
            var action = btn.dataset.action;
            var path = btn.dataset.path;
            switch (action) {
                case 'upload':       doUpload(path, btn); break;
                case 'download':     doDownload(path, btn); break;
                case 'delete-client': doDeleteClient(path, btn); break;
                case 'delete-server': doDeleteServer(path, btn); break;
                case 'pull-device': doDevicePull(path, btn.dataset.device, btn); break;
            }
        });

        // ---- force sync ----

        async function forceSync() {
            document.getElementById('sync-btn').disabled = true;
            try {
                await fetch('/api/force-sync', { method: 'POST' });
                // Poll immediately to show syncing state, then refresh file lists
                setTimeout(async function() {
                    await fetchStatus();
                    await refreshFileLists();
                }, 500);
            } catch (e) {
                document.getElementById('sync-btn').disabled = false;
            }
        }

        // ---- combined poll ----

        // ---- polling ----
        // Status polling: lightweight, local HTTP only (no TCP to server)
        // File list refresh: only on load and after operations (avoids TCP spam)

        async function pollStatus() {
            if (operationInFlight) return;
            await fetchStatus();
        }

        // Initial load: fetch both status and file lists once
        fetchStatus();
        refreshFileLists();
        // Only poll status on the timer — file lists refresh after operations
        setInterval(pollStatus, 5000);
    </script>
</body>
</html>
