<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultSync Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="font-[-apple-system,BlinkMacSystemFont,'Segoe_UI',sans-serif] m-0 p-0">
    <!-- Outermost container: full viewport, flex row on desktop, column on mobile -->
    <div class="h-dvh flex flex-col lg:flex-row bg-[#1a1a2e] text-[#e0e0e0]">

        <!-- Sidebar (hidden on mobile) -->
        <aside class="w-56 bg-[#16213e] border-r border-[#2a2a4a] shrink-0 hidden lg:flex flex-col">
            <!-- Brand -->
            <div class="p-4 border-b border-[#2a2a4a] flex items-center gap-2">
                <svg class="w-5 h-5 text-[#4d9eff]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                <span class="text-base font-semibold tracking-wide">VaultSync</span>
            </div>
            <!-- Navigation -->
            <div>
                <div class="text-[10px] uppercase tracking-widest text-[#556] px-4 pt-4 pb-2">Navigation</div>
                <nav class="flex flex-col gap-0.5 px-2">
                    <div class="flex items-center gap-3 px-3 py-2 text-sm rounded-md cursor-pointer bg-[#1a1a2e]">
                        <svg class="w-4 h-4 text-[#888]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
                        All Files
                    </div>
                    <div class="flex items-center gap-3 px-3 py-2 text-sm rounded-md cursor-pointer hover:bg-[#1a1a2e]">
                        <svg class="w-4 h-4 text-[#888]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                        Local Files
                    </div>
                    <div class="flex items-center gap-3 px-3 py-2 text-sm rounded-md cursor-pointer hover:bg-[#1a1a2e]">
                        <svg class="w-4 h-4 text-[#888]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg>
                        Server Files
                    </div>
                </nav>
            </div>
            <!-- Spacer -->
            <div class="flex-1"></div>
            <!-- Bottom: device name -->
            <div id="sidebar-device-name" class="text-xs text-[#556] p-4 border-t border-[#2a2a4a]">Loading...</div>
        </aside>

        <!-- Right column: header + content -->
        <div class="flex-1 flex flex-col min-h-0">

            <!-- Header bar -->
            <header class="h-14 bg-[#16213e] border-b border-[#2a2a4a] flex items-center justify-between px-4 shrink-0">
                <div class="text-lg font-semibold">All Files</div>
                <div class="flex items-center gap-4">
                    <!-- Sync stats -->
                    <div class="text-xs text-[#888] hidden sm:flex items-center gap-1.5">
                        <span id="header-file-count">0 files</span>
                        <span class="text-[#556]">|</span>
                        <span id="header-total-size">0 B</span>
                    </div>
                    <!-- Last sync -->
                    <span id="header-last-sync" class="text-xs text-[#888] hidden sm:inline">Never synced</span>
                    <!-- Connection indicator -->
                    <div class="flex items-center gap-1.5 text-[13px] text-[#aaa]">
                        <span id="conn-dot" class="inline-block w-2 h-2 rounded-full bg-[#f24c4c] shadow-[0_0_6px_#f24c4c88]"></span>
                        <span id="conn-text">Disconnected</span>
                    </div>
                    <!-- Sync button -->
                    <button id="sync-btn" onclick="forceSync()" class="bg-[#0f62fe] hover:bg-[#0043ce] text-white text-sm font-medium px-4 py-1.5 rounded-md disabled:bg-[#2a2a4a] disabled:text-[#666] disabled:cursor-not-allowed cursor-pointer border-none">Full Sync</button>
                </div>
            </header>

            <!-- Content area -->
            <main class="flex-1 overflow-y-auto p-4 min-h-0">
                <!-- Error banner -->
                <div id="error-banner" class="bg-[#3a1c1c] border border-[#f24c4c44] rounded-md px-4 py-3 mb-4 text-[13px] text-[#f24c4c] hidden"></div>

                <!-- Status cards -->
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
                    <div class="bg-[#16213e] border border-[#2a2a4a] rounded-lg px-4 py-3.5">
                        <div class="text-[11px] uppercase tracking-wider text-[#888] mb-1.5">Connection</div>
                        <div class="text-base font-semibold flex items-center gap-1.5">
                            <span id="status-conn-dot" class="inline-block w-2 h-2 rounded-full bg-[#f24c4c] shadow-[0_0_6px_#f24c4c88]"></span>
                            <span id="status-conn-text">Disconnected</span>
                        </div>
                    </div>
                    <div class="bg-[#16213e] border border-[#2a2a4a] rounded-lg px-4 py-3.5">
                        <div class="text-[11px] uppercase tracking-wider text-[#888] mb-1.5">Sync Status</div>
                        <div class="text-base font-semibold flex items-center gap-1.5">
                            <span id="sync-dot" class="inline-block w-2 h-2 rounded-full bg-[#00d26a] shadow-[0_0_6px_#00d26a88]"></span>
                            <span id="sync-text">Idle</span>
                        </div>
                    </div>
                    <div class="bg-[#16213e] border border-[#2a2a4a] rounded-lg px-4 py-3.5">
                        <div class="text-[11px] uppercase tracking-wider text-[#888] mb-1.5">Synced Files</div>
                        <div class="text-base font-semibold" id="total-files">0</div>
                        <div class="text-xs text-[#888] mt-1" id="total-size">0 B</div>
                    </div>
                    <div class="bg-[#16213e] border border-[#2a2a4a] rounded-lg px-4 py-3.5">
                        <div class="text-[11px] uppercase tracking-wider text-[#888] mb-1.5">Last Sync</div>
                        <div class="text-base font-semibold" id="last-sync-time">Never</div>
                        <div class="text-xs text-[#888] mt-1" id="last-sync-detail"></div>
                    </div>
                </div>

                <!-- File browser two-panel grid -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
                    <!-- Left panel: local files -->
                    <div class="bg-[#16213e] border border-[#2a2a4a] rounded-lg overflow-hidden">
                        <div class="px-4 py-3 border-b border-[#2a2a4a] bg-[#1a2444]">
                            <div class="text-xs uppercase tracking-wider text-[#8899bb] font-semibold">Local</div>
                            <div class="text-[11px] text-[#556] mt-0.5 font-mono" id="local-path">~/VaultDrive</div>
                        </div>
                        <div class="max-h-[480px] overflow-y-auto" id="local-file-list">
                            <div class="py-6 px-4 text-center text-[#556] text-[13px] italic">Loading...</div>
                        </div>
                    </div>

                    <!-- Right panel: server files -->
                    <div class="bg-[#16213e] border border-[#2a2a4a] rounded-lg overflow-hidden">
                        <div class="px-4 py-3 border-b border-[#2a2a4a] bg-[#1a2444]">
                            <div class="text-xs uppercase tracking-wider text-[#8899bb] font-semibold">Server</div>
                            <div class="text-[11px] text-[#556] mt-0.5 font-mono">Remote storage</div>
                        </div>
                        <div class="max-h-[480px] overflow-y-auto" id="server-file-list">
                            <div class="py-6 px-4 text-center text-[#556] text-[13px] italic">Loading...</div>
                        </div>
                    </div>
                </div>

                <!-- Activity log -->
                <div>
                    <h2 class="text-xs uppercase tracking-wider text-[#888] mb-3">Activity Log</h2>
                    <div id="activity-log" class="bg-[#16213e] border border-[#2a2a4a] rounded-lg max-h-[200px] overflow-y-auto">
                        <div class="py-8 px-6 text-center text-[#556] text-[13px]">No activity yet</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // ---- global state ----
        var operationInFlight = false;
        var currentDeviceName = '';

        // ---- Tailwind button class constants ----
        var BTN_BASE = 'px-2.5 py-1 rounded text-[11px] font-medium cursor-pointer border transition-all whitespace-nowrap disabled:opacity-40 disabled:cursor-not-allowed';
        var BTN_PUSH = BTN_BASE + ' bg-[#0d2244] text-[#4d9eff] border-[#4d9eff44] hover:bg-[#1a3366] hover:border-[#4d9eff]';
        var BTN_PULL = BTN_BASE + ' bg-[#2a0d44] text-[#c080ff] border-[#c080ff44] hover:bg-[#3a1a66] hover:border-[#c080ff]';
        var BTN_DELETE = BTN_BASE + ' bg-[#2a0d0d] text-[#f24c4c] border-[#f24c4c33] hover:bg-[#3a1a1a] hover:border-[#f24c4c]';

        // ---- helpers ----

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML.replace(/"/g, '&quot;');
        }

        function formatSize(bytes) {
            if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
            if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
            if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return bytes + ' B';
        }

        function timeAgo(dateStr) {
            var now = new Date();
            var then = new Date(dateStr);
            var seconds = Math.floor((now - then) / 1000);
            if (seconds < 5) return 'just now';
            if (seconds < 60) return seconds + 's ago';
            var minutes = Math.floor(seconds / 60);
            if (minutes < 60) return minutes + 'm ago';
            var hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + 'h ago';
            return Math.floor(hours / 24) + 'd ago';
        }

        function formatTime(dateStr) {
            var d = new Date(dateStr);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function fileIcon(relPath) {
            var ext = relPath.split('.').pop().toLowerCase();
            var icons = {
                'pdf': '\uD83D\uDCCB',
                'doc': '\uD83D\uDCDD', 'docx': '\uD83D\uDCDD',
                'xls': '\uD83D\uDCCA', 'xlsx': '\uD83D\uDCCA',
                'ppt': '\uD83D\uDCCA', 'pptx': '\uD83D\uDCCA',
                'jpg': '\uD83D\uDDBC', 'jpeg': '\uD83D\uDDBC',
                'png': '\uD83D\uDDBC', 'gif': '\uD83D\uDDBC', 'svg': '\uD83D\uDDBC',
                'mp4': '\uD83C\uDFA5', 'mov': '\uD83C\uDFA5', 'avi': '\uD83C\uDFA5',
                'mp3': '\uD83C\uDFB5', 'flac': '\uD83C\uDFB5', 'wav': '\uD83C\uDFB5',
                'zip': '\uD83D\uDCE6', 'tar': '\uD83D\uDCE6', 'gz': '\uD83D\uDCE6',
                'go': '\uD83D\uDCBB', 'js': '\uD83D\uDCBB', 'ts': '\uD83D\uDCBB',
                'py': '\uD83D\uDCBB', 'sh': '\uD83D\uDCBB', 'rs': '\uD83D\uDCBB',
                'txt': '\uD83D\uDCC4', 'md': '\uD83D\uDCC4', 'log': '\uD83D\uDCC4'
            };
            return icons[ext] || '\uD83D\uDCC4';
        }

        // ---- disable/enable all action buttons ----

        function setButtonsDisabled(disabled) {
            var btns = document.querySelectorAll('button[data-action]');
            btns.forEach(function(b) { b.disabled = disabled; });
        }

        // ---- file list join and render ----

        function computeStatus(localMap, serverMap, relPath) {
            var inLocal = localMap.hasOwnProperty(relPath);
            var inServer = serverMap.hasOwnProperty(relPath);
            if (inLocal && inServer) {
                if (localMap[relPath].hash === serverMap[relPath].hash) {
                    return 'synced';
                }
                return 'conflict';
            }
            if (inLocal) return 'local-only';
            return 'server-only';
        }

        function badgeHtml(status) {
            var base = 'inline-flex items-center px-1.5 rounded-full text-[10px] font-semibold tracking-wide uppercase';
            switch (status) {
                case 'synced':     return '<span class="' + base + ' bg-[#0d3b2e] text-[#00d26a] border border-[#00d26a44]">synced</span>';
                case 'conflict':   return '<span class="' + base + ' bg-[#3b2e0d] text-[#f0c040] border border-[#f0c04044]">conflict</span>';
                case 'local-only': return '<span class="' + base + ' bg-[#0d1e3b] text-[#4d9eff] border border-[#4d9eff44]">local only</span>';
                case 'server-only': return '<span class="' + base + ' bg-[#2e0d3b] text-[#c080ff] border border-[#c080ff44]">server only</span>';
            }
            return '';
        }

        function makeBtn(cls, label, action, relPath, deviceId) {
            var btnClass = cls === 'btn-push' ? BTN_PUSH : cls === 'btn-pull' ? BTN_PULL : BTN_DELETE;
            var deviceAttr = deviceId ? ' data-device="' + escapeHtml(deviceId) + '"' : '';
            return '<button class="' + btnClass + '" data-action="' + action + '" data-path="' + escapeHtml(relPath) + '"' + deviceAttr + '>' + label + '</button>';
        }

        function renderLocalRow(f, status) {
            var actions = '';
            if (status === 'local-only' || status === 'conflict') {
                actions += makeBtn('btn-push', 'Push \u2192', 'upload', f.rel_path);
            }
            actions += makeBtn('btn-delete', 'Delete', 'delete-client', f.rel_path);

            return '<div class="px-4 py-2.5 border-b border-[#1e2a4a] last:border-b-0 flex items-center gap-2.5 text-[13px] transition-colors hover:bg-[#1e2a4a]">' +
                '<span class="text-sm shrink-0 w-[18px] text-center">' + fileIcon(f.rel_path) + '</span>' +
                '<div class="flex-1 min-w-0">' +
                    '<div class="font-mono text-xs whitespace-nowrap overflow-hidden text-ellipsis text-[#d0d8f0]" title="' + escapeHtml(f.rel_path) + '">' + escapeHtml(f.rel_path) + '</div>' +
                    '<div class="text-[11px] text-[#666] mt-0.5 flex items-center gap-2">' + f.size_human + ' \u00B7 ' + badgeHtml(status) + '</div>' +
                '</div>' +
                '<div class="flex gap-1.5 shrink-0">' + actions + '</div>' +
                '</div>';
        }

        function groupByDevice(serverFiles) {
            var groups = {};
            serverFiles.forEach(function(f) {
                var device = f.device_id || 'Unknown Device';
                if (!groups.hasOwnProperty(device)) groups[device] = [];
                groups[device].push(f);
            });
            return groups;
        }

        function renderServerFileRow(f, localMap, device, isMine) {
            var actions = '';
            var alreadyLocal = localMap.hasOwnProperty(f.rel_path) && localMap[f.rel_path].hash === f.hash;
            if (!alreadyLocal) {
                actions += makeBtn('btn-pull', 'Pull here', 'pull-device', f.rel_path, device);
            }
            if (isMine) {
                actions += makeBtn('btn-delete', 'Remove', 'delete-server', f.rel_path);
            }
            var localBadge = alreadyLocal ? ' \u00B7 <span class="inline-flex items-center px-1.5 rounded-full text-[10px] font-semibold tracking-wide uppercase bg-[#0d3b2e] text-[#00d26a] border border-[#00d26a44]">local copy</span>' : '';

            return '<div class="px-4 py-2.5 border-b border-[#1e2a4a] last:border-b-0 flex items-center gap-2.5 text-[13px] transition-colors hover:bg-[#1e2a4a]">' +
                '<span class="text-sm shrink-0 w-[18px] text-center">' + fileIcon(f.rel_path) + '</span>' +
                '<div class="flex-1 min-w-0">' +
                    '<div class="font-mono text-xs whitespace-nowrap overflow-hidden text-ellipsis text-[#d0d8f0]" title="' + escapeHtml(f.rel_path) + '">' + escapeHtml(f.rel_path) + '</div>' +
                    '<div class="text-[11px] text-[#666] mt-0.5 flex items-center gap-2">' + f.size_human + localBadge + '</div>' +
                '</div>' +
                '<div class="flex gap-1.5 shrink-0">' + actions + '</div>' +
                '</div>';
        }

        function renderServerGroups(serverFiles, localMap) {
            if (!serverFiles || serverFiles.length === 0) {
                return '<div class="py-8 px-6 text-center text-[#556] text-[13px]">No server files</div>';
            }
            var groups = groupByDevice(serverFiles);
            var deviceNames = Object.keys(groups).sort(function(a, b) {
                if (a === currentDeviceName) return -1;
                if (b === currentDeviceName) return 1;
                return a < b ? -1 : a > b ? 1 : 0;
            });
            var html = '';
            deviceNames.forEach(function(device) {
                var isMine = (device === currentDeviceName);
                html += '<div class="border-b-2 border-[#2a2a4a]">';
                html += '<div class="px-4 py-2 pt-2 text-[11px] uppercase tracking-wider text-[#8899bb] font-bold bg-[#1a2444] border-b border-[#2a2a4a] sticky top-0 z-[1]">' + escapeHtml(device) + '</div>';
                groups[device].forEach(function(f) {
                    html += renderServerFileRow(f, localMap, device, isMine);
                });
                html += '</div>';
            });
            return html;
        }

        function renderFileLists(clientFiles, serverFiles) {
            // Build maps keyed by rel_path
            var localMap = {};
            clientFiles.forEach(function(f) { localMap[f.rel_path] = f; });
            var serverMap = {};
            serverFiles.forEach(function(f) { serverMap[f.rel_path] = f; });

            // Collect all unique rel_paths, sorted alphabetically (for local panel)
            var allPaths = Object.keys(localMap).concat(
                Object.keys(serverMap).filter(function(p) { return !localMap.hasOwnProperty(p); })
            ).sort();

            var localHtml = '';

            allPaths.forEach(function(relPath) {
                var status = computeStatus(localMap, serverMap, relPath);

                if (localMap.hasOwnProperty(relPath)) {
                    localHtml += renderLocalRow(localMap[relPath], status);
                }
            });

            var localList = document.getElementById('local-file-list');
            var serverList = document.getElementById('server-file-list');

            localList.innerHTML = localHtml || '<div class="py-8 px-6 text-center text-[#556] text-[13px]">No local files</div>';
            serverList.innerHTML = renderServerGroups(serverFiles, localMap);

            // Re-apply disabled state if an operation is in flight
            if (operationInFlight) {
                setButtonsDisabled(true);
            }
        }

        // ---- file list refresh ----

        async function refreshFileLists() {
            try {
                var results = await Promise.all([
                    fetch('/api/files/client').then(function(r) { return r.json(); }),
                    fetch('/api/files/server').then(function(r) { return r.json(); })
                ]);
                var clientFiles = (results[0].files || []).slice().sort(function(a, b) {
                    return a.rel_path < b.rel_path ? -1 : a.rel_path > b.rel_path ? 1 : 0;
                });
                var serverFiles = (results[1].files || []).slice().sort(function(a, b) {
                    return a.rel_path < b.rel_path ? -1 : a.rel_path > b.rel_path ? 1 : 0;
                });
                renderFileLists(clientFiles, serverFiles);
            } catch (e) {
                // Silently ignore network errors during polling
            }
        }

        // ---- status polling ----

        function updateStatus(data) {
            if (data.device_name) currentDeviceName = data.device_name;

            // Header connection dot
            var connDot = document.getElementById('conn-dot');
            var connText = document.getElementById('conn-text');
            if (data.connected) {
                connDot.className = 'inline-block w-2 h-2 rounded-full bg-[#00d26a] shadow-[0_0_6px_#00d26a88]';
            } else {
                connDot.className = 'inline-block w-2 h-2 rounded-full bg-[#f24c4c] shadow-[0_0_6px_#f24c4c88]';
            }
            connText.textContent = data.connected ? 'Connected' : 'Disconnected';

            // Status card: connection
            var scDot = document.getElementById('status-conn-dot');
            var scText = document.getElementById('status-conn-text');
            if (data.connected) {
                scDot.className = 'inline-block w-2 h-2 rounded-full bg-[#00d26a] shadow-[0_0_6px_#00d26a88]';
            } else {
                scDot.className = 'inline-block w-2 h-2 rounded-full bg-[#f24c4c] shadow-[0_0_6px_#f24c4c88]';
            }
            scText.textContent = data.connected ? 'Connected' : 'Disconnected';

            // Status card: sync status
            var syncDot = document.getElementById('sync-dot');
            var syncText = document.getElementById('sync-text');
            if (data.syncing) {
                syncDot.className = 'inline-block w-2 h-2 rounded-full bg-[#f0c040] shadow-[0_0_6px_#f0c04088]';
                syncText.textContent = 'Syncing...';
            } else {
                syncDot.className = 'inline-block w-2 h-2 rounded-full bg-[#00d26a] shadow-[0_0_6px_#00d26a88]';
                syncText.textContent = 'Idle';
            }

            // Storage stats
            document.getElementById('total-files').textContent = data.total_files;
            document.getElementById('total-size').textContent = formatSize(data.total_size);

            // Last sync
            var lastTime = document.getElementById('last-sync-time');
            var lastDetail = document.getElementById('last-sync-detail');
            if (data.last_sync_time && data.last_sync_time !== '0001-01-01T00:00:00Z') {
                lastTime.textContent = timeAgo(data.last_sync_time);
                lastDetail.textContent =
                    '\u2191' + data.last_sync_uploaded +
                    ' \u2193' + data.last_sync_downloaded +
                    ' \u2717' + data.last_sync_deleted;
            } else {
                lastTime.textContent = 'Never';
                lastDetail.textContent = '';
            }

            // Error banner
            var banner = document.getElementById('error-banner');
            if (data.last_sync_error) {
                banner.textContent = data.last_sync_error;
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden');
            }

            // Full sync button: disabled while syncing
            document.getElementById('sync-btn').disabled = data.syncing;

            // Activity log
            var log = document.getElementById('activity-log');
            if (!data.activities || data.activities.length === 0) {
                log.innerHTML = '<div class="py-8 px-6 text-center text-[#556] text-[13px]">No activity yet</div>';
            } else {
                log.innerHTML = data.activities.map(function(a) {
                    return '<div class="px-4 py-2 border-b border-[#1e2a4a] last:border-b-0 flex gap-3 text-xs">' +
                        '<span class="text-[#555] font-mono text-[11px] whitespace-nowrap min-w-[80px]">' + formatTime(a.time) + '</span>' +
                        '<span class="font-mono text-[11px] text-[#aaa]">' + escapeHtml(a.message) + '</span>' +
                        '</div>';
                }).join('');
            }

            // Header chrome updates
            document.getElementById('header-file-count').textContent = data.total_files + ' files';
            document.getElementById('header-total-size').textContent = formatSize(data.total_size);
            if (data.last_sync_time && data.last_sync_time !== '0001-01-01T00:00:00Z') {
                document.getElementById('header-last-sync').textContent = 'Synced ' + timeAgo(data.last_sync_time);
            } else {
                document.getElementById('header-last-sync').textContent = 'Never synced';
            }
            if (data.device_name) {
                document.getElementById('sidebar-device-name').textContent = data.device_name;
            }
        }

        async function fetchStatus() {
            try {
                var resp = await fetch('/api/status');
                if (!resp.ok) return;
                var data = await resp.json();
                updateStatus(data);
            } catch (e) {
                // UI server itself is down -- handle gracefully
            }
        }

        // ---- per-file operations ----

        // Show inline feedback on the row containing the clicked button
        function showFeedback(btn, msg, isError) {
            var row = btn.closest('div.flex.items-center');
            if (!row) return;
            var existing = row.querySelector('.text-[\\#00d26a], .text-[\\#f24c4c]');
            if (existing && (existing.classList.contains('text-[11px]')) && existing.tagName === 'SPAN') existing.remove();
            var span = document.createElement('span');
            span.className = isError ? 'text-[11px] text-[#f24c4c] py-0.5' : 'text-[11px] text-[#00d26a] py-0.5';
            span.textContent = msg;
            span.dataset.feedback = 'true';
            var actions = btn.parentElement;
            if (actions) actions.appendChild(span);
            // Auto-remove after 3s
            setTimeout(function() { if (span.parentNode) span.remove(); }, 3000);
        }

        async function doUpload(relPath, btn) {
            if (operationInFlight) return;
            operationInFlight = true;
            var origText = btn.textContent;
            btn.textContent = '...';
            setButtonsDisabled(true);
            try {
                var resp = await fetch('/api/files/upload?path=' + encodeURIComponent(relPath), { method: 'POST' });
                var data = await resp.json();
                if (data.ok) {
                    showFeedback(btn, 'Pushed', false);
                    await refreshFileLists();
                    await fetchStatus();
                } else {
                    showFeedback(btn, data.message || 'Upload failed', true);
                }
            } catch (e) {
                showFeedback(btn, 'Network error', true);
            } finally {
                operationInFlight = false;
                btn.textContent = origText;
                setButtonsDisabled(false);
            }
        }

        async function doDownload(relPath, btn) {
            if (operationInFlight) return;
            operationInFlight = true;
            var origText = btn.textContent;
            btn.textContent = '...';
            setButtonsDisabled(true);
            try {
                var resp = await fetch('/api/files/download?path=' + encodeURIComponent(relPath), { method: 'POST' });
                var data = await resp.json();
                if (data.ok) {
                    showFeedback(btn, 'Pulled', false);
                    await refreshFileLists();
                    await fetchStatus();
                } else {
                    showFeedback(btn, data.message || 'Download failed', true);
                }
            } catch (e) {
                showFeedback(btn, 'Network error', true);
            } finally {
                operationInFlight = false;
                btn.textContent = origText;
                setButtonsDisabled(false);
            }
        }

        async function doDevicePull(relPath, device, btn) {
            if (operationInFlight) return;
            operationInFlight = true;
            var origText = btn.textContent;
            btn.textContent = '...';
            setButtonsDisabled(true);
            try {
                var resp = await fetch('/api/files/pull?path=' + encodeURIComponent(relPath) + '&from=' + encodeURIComponent(device), { method: 'POST' });
                var data = await resp.json();
                if (data.ok) {
                    showFeedback(btn, 'Pulled', false);
                    await refreshFileLists();
                    await fetchStatus();
                } else {
                    showFeedback(btn, data.message || 'Pull failed', true);
                }
            } catch (e) {
                showFeedback(btn, 'Network error', true);
            } finally {
                operationInFlight = false;
                btn.textContent = origText;
                setButtonsDisabled(false);
            }
        }

        async function doDeleteServer(relPath, btn) {
            if (operationInFlight) return;
            if (!confirm('Delete "' + relPath + '" from server and local disk? Other devices\' copies are not affected.')) return;
            operationInFlight = true;
            var origText = btn.textContent;
            btn.textContent = '...';
            setButtonsDisabled(true);
            try {
                var resp = await fetch('/api/files/server?path=' + encodeURIComponent(relPath), { method: 'DELETE' });
                var data = await resp.json();
                if (data.ok) {
                    showFeedback(btn, 'Deleted', false);
                    await refreshFileLists();
                    await fetchStatus();
                } else {
                    showFeedback(btn, data.message || 'Delete failed', true);
                }
            } catch (e) {
                showFeedback(btn, 'Network error', true);
            } finally {
                operationInFlight = false;
                btn.textContent = origText;
                setButtonsDisabled(false);
            }
        }

        async function doDeleteClient(relPath, btn) {
            if (operationInFlight) return;
            if (!confirm('Delete "' + relPath + '" from local storage?')) return;
            operationInFlight = true;
            var origText = btn.textContent;
            btn.textContent = '...';
            setButtonsDisabled(true);
            try {
                var resp = await fetch('/api/files/client?path=' + encodeURIComponent(relPath), { method: 'DELETE' });
                var data = await resp.json();
                if (data.ok) {
                    showFeedback(btn, 'Deleted', false);
                    await refreshFileLists();
                    await fetchStatus();
                } else {
                    showFeedback(btn, data.message || 'Delete failed', true);
                }
            } catch (e) {
                showFeedback(btn, 'Network error', true);
            } finally {
                operationInFlight = false;
                btn.textContent = origText;
                setButtonsDisabled(false);
            }
        }

        // ---- delegated click handler for file action buttons ----

        document.addEventListener('click', function(e) {
            var btn = e.target.closest('button[data-action]');
            if (!btn) return;
            var action = btn.dataset.action;
            var path = btn.dataset.path;
            switch (action) {
                case 'upload':       doUpload(path, btn); break;
                case 'download':     doDownload(path, btn); break;
                case 'delete-client': doDeleteClient(path, btn); break;
                case 'delete-server': doDeleteServer(path, btn); break;
                case 'pull-device': doDevicePull(path, btn.dataset.device, btn); break;
            }
        });

        // ---- force sync ----

        async function forceSync() {
            document.getElementById('sync-btn').disabled = true;
            try {
                await fetch('/api/force-sync', { method: 'POST' });
                // Poll immediately to show syncing state, then refresh file lists
                setTimeout(async function() {
                    await fetchStatus();
                    await refreshFileLists();
                }, 500);
            } catch (e) {
                document.getElementById('sync-btn').disabled = false;
            }
        }

        // ---- polling ----
        // Status polling: lightweight, local HTTP only (no TCP to server)
        // File list refresh: only on load and after operations (avoids TCP spam)

        async function pollStatus() {
            if (operationInFlight) return;
            await fetchStatus();
        }

        // Initial load: fetch both status and file lists once
        fetchStatus();
        refreshFileLists();
        // Only poll status on the timer -- file lists refresh after operations
        setInterval(pollStatus, 5000);
    </script>
</body>
</html>
