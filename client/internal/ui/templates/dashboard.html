<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myDrive</title>
  <style>
    :root {
      --bg-base:        #f5f5f7;
      --bg-surface:     #ffffff;
      --bg-header:      #ffffff;
      --border:         rgba(0,0,0,0.08);
      --border-width:   0.5px;
      --text-primary:   #1d1d1f;
      --text-secondary: #6e6e73;
      --text-muted:     #aeaeb2;
      --accent:         #0071e3;
      --accent-hover:   #0077ed;
      --accent-text:    #ffffff;
      --success:        #34c759;
      --warn:           #ff9f0a;
      --danger:         #ff3b30;
      --font:           -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius-sm:      4px;
      --radius-md:      6px;
      --radius-lg:      8px;
      --row-selected-bg:       rgba(0, 113, 227, 0.12);
      --row-selected-hover-bg: rgba(0, 113, 227, 0.18);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-base:        #000000;
        --bg-surface:     #1c1c1e;
        --bg-header:      #1c1c1e;
        --border:         rgba(255,255,255,0.10);
        --row-selected-bg:       rgba(10, 132, 255, 0.18);
        --row-selected-hover-bg: rgba(10, 132, 255, 0.26);
        --text-primary:   #f5f5f7;
        --text-secondary: #98989d;
        --text-muted:     #636366;
        --accent:         #0a84ff;
        --accent-hover:   #409cff;
        --accent-text:    #ffffff;
        --success:        #30d158;
        --warn:           #ffd60a;
        --danger:         #ff453a;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    /* NO box-shadow, NO gradient anywhere — GLOB-07 flat aesthetic */
    /* Borders use var(--border) at var(--border-width) (0.5px) */

    #app-header {
      background: var(--bg-header);
      border-bottom: var(--border-width) solid var(--border);
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .nav-tabs { display: flex; gap: 0; margin-left: auto; }
    .tab {
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      user-select: none;
    }
    .tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent);
    }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--accent-text);
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 16px;
    }
    #app-main { flex: 1; overflow-y: auto; }

    /* Overview layout */
    #view-overview {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* Donut chart */
    .donut-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .donut-svg { transform: rotate(-90deg); }
    .donut-track {
      fill: none;
      stroke: var(--border);
      stroke-width: 18;
    }
    .donut-used {
      fill: none;
      stroke: var(--accent);
      stroke-width: 18;
      stroke-linecap: round;
      transition: stroke-dasharray 0.6s ease;
    }
    .donut-label {
      position: absolute;
      text-align: center;
      pointer-events: none;
    }
    .donut-free-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.1;
    }
    .donut-free-unit {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Stat cards */
    .stat-cards {
      display: flex;
      gap: 12px;
      width: 100%;
      justify-content: center;
    }
    .stat-card {
      flex: 1;
      background: var(--bg-surface);
      border: var(--border-width) solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      min-width: 0;
    }
    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .stat-value.sync-ok   { color: var(--success); }
    .stat-value.sync-busy { color: var(--warn); }

    /* Activity feed */
    .activity-section { width: 100%; }
    .activity-heading {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .activity-list {
      background: var(--bg-surface);
      border: var(--border-width) solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .activity-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: var(--border-width) solid var(--border);
      font-size: 13px;
    }
    .activity-row:last-child { border-bottom: none; }
    .activity-badge {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-up   { background: var(--accent);   color: var(--accent-text); }
    .badge-down { background: var(--success);  color: #fff; }
    .badge-del  { background: var(--danger);   color: #fff; }
    .badge-sync { background: var(--warn);     color: #fff; }
    .activity-filename {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-primary);
    }
    .activity-meta {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* Browse button */
    .browse-btn {
      background: transparent;
      border: var(--border-width) solid var(--accent);
      color: var(--accent);
      border-radius: var(--radius-md);
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
      font-family: var(--font);
    }
    .browse-btn:hover { background: var(--accent); color: var(--accent-text); }

    /* Empty state */
    .activity-empty {
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ---- Files view ---- */
    #view-local {
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Breadcrumb path bar (FILE-01) */
    #files-breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      font-size: 13px;
      margin-bottom: 12px;
      color: var(--text-secondary);
    }
    .bc-seg {
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font: inherit;
      font-size: 13px;
    }
    .bc-seg:hover { text-decoration: underline; }
    .bc-cur { color: var(--text-primary); font-weight: 500; }
    .bc-sep { color: var(--text-muted); }

    /* Table container (FILE-04) */
    .files-table-wrap {
      background: var(--bg-surface);
      border: var(--border-width) solid var(--border);
      border-radius: 6px;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /* Table (FILE-02) */
    .files-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 480px;
    }
    .files-table thead th {
      text-align: left;
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: var(--border-width) solid var(--border);
      background: var(--bg-surface);
    }
    .files-table tbody tr {
      border-bottom: var(--border-width) solid var(--border);
      transition: background 0.1s;
      cursor: default;
    }
    .files-table tbody tr:last-child { border-bottom: none; }
    .files-table tbody tr:hover { background: var(--bg-base); } /* FILE-04 hover highlight */
    .files-table tbody tr.row-folder { cursor: pointer; }
    .files-table td {
      padding: 12px 14px;
      color: var(--text-primary);
      white-space: nowrap;
    }
    .td-name {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      max-width: 400px;
      overflow: hidden;
    }
    .td-name-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .td-muted { color: var(--text-secondary); }
    .td-mono  { font-variant-numeric: tabular-nums; }

    /* ---- Per-row action buttons (A11Y-03) ---- */
    /* Container: sits in the Actions td, right-aligned */
    .row-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    /* Desktop: hide until row is hovered */
    @media (pointer: fine) {
      .row-actions { visibility: hidden; }
      .files-table tbody tr:hover .row-actions { visibility: visible; }
    }

    /* Mobile: always visible (pointer: coarse covers touchscreens) */
    @media (pointer: coarse) {
      .row-actions { visibility: visible; }
    }

    /* Individual action button */
    .action-btn {
      background: transparent;
      border: var(--border-width) solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 11px;
      font-family: var(--font);
      padding: 4px 10px;
      min-height: 28px;   /* row td padding gives 44px touch target at row level */
      cursor: pointer;
      white-space: nowrap;
      line-height: 1;
    }
    .action-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .action-btn.danger:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* Mobile: larger tap surface */
    @media (pointer: coarse) {
      .action-btn {
        padding: 8px 12px;
        min-height: 36px;
        font-size: 12px;
      }
    }

    /* Extension badges (GLOB-06) */
    .ext-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 28px;
      height: 20px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    /* Palette — all via CSS variables or hardcoded only inside <style>, never in JS strings */
    .ext-green  { background: #d1fae5; color: #065f46; } /* yml, yaml, json, toml */
    .ext-blue   { background: #dbeafe; color: #1e40af; } /* md, txt, csv */
    .ext-purple { background: #ede9fe; color: #5b21b6; } /* pdf, doc, docx */
    .ext-orange { background: #ffedd5; color: #9a3412; } /* jpg, jpeg, png, gif, webp, svg */
    .ext-red    { background: #fee2e2; color: #991b1b; } /* zip, tar, gz, bz2, 7z */
    .ext-teal   { background: #ccfbf1; color: #115e59; } /* go, py, js, ts, sh, rs, c, cpp, h */
    .ext-grey   { background: var(--bg-base); color: var(--text-muted); border: var(--border-width) solid var(--border); } /* unknown */

    /* Dark-mode-safe badge overrides */
    @media (prefers-color-scheme: dark) {
      .ext-green  { background: #064e3b; color: #6ee7b7; }
      .ext-blue   { background: #1e3a5f; color: #93c5fd; }
      .ext-purple { background: #2d1b69; color: #c4b5fd; }
      .ext-orange { background: #431407; color: #fdba74; }
      .ext-red    { background: #450a0a; color: #fca5a5; }
      .ext-teal   { background: #134e4a; color: #5eead4; }
    }

    /* Folder icon color */
    .folder-icon { color: var(--accent); flex-shrink: 0; }

    /* Sync status dots (FILE-06) — rendered by Plan 02 */
    .sync-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sync-dot.synced { background: var(--success); }
    .sync-dot.amber  { background: var(--warn); }
    .sync-dot.server-only { background: var(--text-muted); }

    #view-server {
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    .server-view-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 12px;
    }
    #server-breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--text-secondary);
      flex: 1;
      min-width: 0;
    }
    #server-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      gap: 12px;
    }

    /* ---- Files footer (FILE-05) ---- */
    #files-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      gap: 12px;
    }
    .footer-summary { flex: 1; }
    .footer-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .footer-btn {
      background: transparent;
      border: var(--border-width) solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 12px;
      font-size: 12px;
      font-family: var(--font);
      color: var(--text-secondary);
      cursor: not-allowed;   /* stub — non-functional in v1 */
      opacity: 0.5;
      min-height: 36px;
    }

    /* Error banner (GLOB-04) */
    #error-banner {
      background: var(--danger);
      color: #fff;
      font-size: 13px;
      padding: 8px 20px;
      text-align: center;
    }

    /* Active footer-btn variant — overrides stub opacity/cursor */
    .footer-btn.active {
      cursor: pointer;
      opacity: 1;
    }
    .footer-btn.active:hover {
      background: var(--bg-surface);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ---- Bulk select mode (Phase 3) ---- */
    .bulk-bar {
      position: sticky;
      bottom: 0;
      background: var(--bg-surface);
      border-top: var(--border-width) solid var(--border);
      padding: 10px 14px;
      display: none;
      align-items: center;
      gap: 12px;
      z-index: 5;
    }
    .bulk-bar.visible {
      display: flex;
    }
    .bulk-count {
      font-size: 13px;
      color: var(--text-secondary);
      flex: 1;
      min-width: 0;
    }
    /* Hide per-row action buttons when bulk mode is active */
    .files-table.bulk-active .row-actions { display: none; }
    /* Pointer cursor on rows in bulk mode for tap affordance */
    .files-table.bulk-active tbody tr { cursor: pointer; }
    /* Selected row highlight in bulk mode */
    .files-table.bulk-active tbody tr.row-selected { background: var(--row-selected-bg); }
    .files-table.bulk-active tbody tr.row-selected:hover { background: var(--row-selected-hover-bg); }
  </style>
</head>
<body>
  <header id="app-header">
    <div class="brand">
      <!-- Triangle logo SVG: equilateral triangle, fill=var(--accent), 20x20 -->
      <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
        <polygon points="10,2 18,18 2,18" fill="var(--accent)"/>
      </svg>
      <span class="brand-name">myDrive</span>
    </div>
    <nav class="nav-tabs" id="nav-tabs">
      <div class="tab active" data-tab="overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" data-tab="local" onclick="switchTab('local')">Local Files</div>
      <div class="tab" data-tab="server" onclick="switchTab('server')">Server</div>
    </nav>
    <div class="avatar" id="user-avatar">MD</div>
  </header>
  <div id="error-banner" role="alert" aria-live="polite" style="display:none"></div>
  <main id="app-main">
    <div id="view-overview">
      <!-- Donut chart -->
      <div class="donut-wrap">
        <svg class="donut-svg" width="200" height="200" viewBox="0 0 200 200" aria-label="Storage usage">
          <circle class="donut-track" cx="100" cy="100" r="82"/>
          <circle class="donut-used" id="donut-arc" cx="100" cy="100" r="82"
                  stroke-dasharray="0 516" stroke-dashoffset="0"/>
        </svg>
        <div class="donut-label">
          <div class="donut-free-value" id="donut-free-val">—</div>
          <div class="donut-free-unit" id="donut-free-unit">free</div>
        </div>
      </div>

      <!-- Stat cards -->
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-label">Used</div>
          <div class="stat-value" id="stat-used">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div class="stat-value" id="stat-total">250 GB</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Sync</div>
          <div class="stat-value sync-ok" id="stat-sync">—</div>
        </div>
      </div>

      <!-- Full Sync button (GLOB-04) -->
      <div style="display:flex;justify-content:flex-start;padding:0 0 8px">
        <button id="btn-force-sync" class="footer-btn active" onclick="triggerSync()">Full Sync</button>
        <button id="btn-refresh" class="footer-btn active" onclick="refreshData()">Refresh</button>
      </div>

      <!-- Activity feed -->
      <div class="activity-section">
        <div class="activity-heading">Recent activity</div>
        <div class="activity-list" id="activity-list">
          <div class="activity-empty">No recent activity</div>
        </div>
      </div>

      <!-- Browse files button -->
      <button class="browse-btn" onclick="switchTab('local')">Browse files ↗</button>
    </div>
    <div id="view-local" style="display:none">
      <!-- Breadcrumb + bulk-select trigger -->
      <div class="server-view-header">
        <div id="files-breadcrumb" aria-label="Current path" style="flex:1;min-width:0"></div>
        <button class="footer-btn active" id="local-select-btn" onclick="toggleBulkMode('local')">Select</button>
      </div>

      <!-- File table (FILE-02, FILE-03, FILE-04) -->
      <div class="files-table-wrap">
        <table class="files-table" aria-label="Files">
          <thead>
            <tr>
              <th style="width:40%">Name</th>
              <th style="width:18%">Modified</th>
              <th style="width:12%">Size</th>
              <th style="width:12%">Sync</th>
              <th style="width:16%" aria-label="Actions"></th>
            </tr>
          </thead>
          <tbody id="files-tbody">
            <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-muted)">Loading…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Bulk action bar (BULK-04, A11Y-04): visible only when items selected -->
      <div id="local-bulk-bar" class="bulk-bar" role="toolbar" aria-label="Bulk actions">
        <span class="bulk-count" id="local-bulk-count">0 selected</span>
        <button class="action-btn" onclick="bulkPush()">Push</button>
        <button class="action-btn danger" onclick="bulkDeleteLocal()">Delete</button>
        <button class="footer-btn active" onclick="selectAllFiles('local')">Select All</button>
        <button class="footer-btn active" onclick="clearBulkMode('local')">Cancel</button>
      </div>
      <div id="files-footer"></div>
    </div>
    <div id="view-server" style="display:none">
      <div class="server-view-header">
        <div id="server-breadcrumb" aria-label="Server path"></div>
        <button class="footer-btn active" id="server-select-btn" onclick="toggleBulkMode('server')">Select</button>
        <button class="footer-btn active" onclick="loadServerViewData()">Refresh</button>
      </div>
      <div class="files-table-wrap">
        <table class="files-table" aria-label="Server files">
          <thead>
            <tr>
              <th style="width:45%">Name</th>
              <th style="width:16%">Size</th>
              <th style="width:18%">Status</th>
              <th style="width:19%" aria-label="Actions"></th>
            </tr>
          </thead>
          <tbody id="server-tbody">
            <tr><td colspan="3" style="text-align:center;padding:32px;color:var(--text-muted)">Click Refresh to load server files</td></tr>
          </tbody>
        </table>
      </div>
      <!-- Bulk action bar for server view (BULK-04, A11Y-04) -->
      <div id="server-bulk-bar" class="bulk-bar" role="toolbar" aria-label="Bulk actions">
        <span class="bulk-count" id="server-bulk-count">0 selected</span>
        <button class="action-btn" onclick="bulkPull()">Pull</button>
        <button class="action-btn danger" onclick="bulkDeleteServer()">Delete</button>
        <button class="footer-btn active" onclick="selectAllFiles('server')">Select All</button>
        <button class="footer-btn active" onclick="clearBulkMode('server')">Cancel</button>
      </div>
      <div id="server-footer"></div>
    </div>
  </main>

  <script>
    const TOTAL_BYTES = 250 * 1024 ** 3; // 250 GB cap — hardcoded per GLOB-05

    const App = {
      activeTab: 'overview',
      filesPath: '',                     // only reset on explicit Home breadcrumb click
      serverPath: '',                    // server view navigation path — separate from filesPath
      serverLoaded: false,               // true after first successful loadServerViewData()
      cachedFilesViewData: [],           // set by loadFilesViewData; read by renderFilesTable
      cachedServerFiles: [],             // set by Plan 02 for sync dot computation
      cachedClientMap: Object.create(null), // keyed by rel_path for O(1) sync checks
      cachedServerMap: Object.create(null), // keyed by rel_path for O(1) sync checks
      bulkMode: {
        localActive:    false,
        serverActive:   false,
        localSelected:  new Set(),   // rel_path strings for local selection
        serverSelected: new Set(),   // rel_path strings for server selection
      },
    };

    function switchTab(tab) {
      App.activeTab = tab;
      document.querySelectorAll('.tab').forEach(el => {
        el.classList.toggle('active', el.dataset.tab === tab);
      });
      document.getElementById('view-overview').style.display = tab === 'overview' ? '' : 'none';
      document.getElementById('view-local').style.display    = tab === 'local'    ? '' : 'none';
      document.getElementById('view-server').style.display   = tab === 'server'   ? '' : 'none';
    }

    const CIRCUMFERENCE = 2 * Math.PI * 82; // r=82 matches SVG circle

    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      const v = bytes / Math.pow(1024, i);
      return (i === 0 ? v.toFixed(0) : v.toFixed(1)) + ' ' + units[i];
    }

    function relTime(isoString) {
      const diff = Math.floor((Date.now() - new Date(isoString)) / 1000);
      if (diff < 60)  return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
      if (diff < 86400) return Math.floor(diff / 3600) + ' hr ago';
      return Math.floor(diff / 86400) + ' d ago';
    }

    function activityBadge(message) {
      // Classify from message text; return CSS class and short label
      const m = message.toLowerCase();
      if (m.includes('upload') || m.includes('push') || m.includes('sent')) return ['badge-up',   '↑'];
      if (m.includes('download') || m.includes('pull') || m.includes('recv')) return ['badge-down', '↓'];
      if (m.includes('delete') || m.includes('removed')) return ['badge-del', '✕'];
      return ['badge-sync', '↻'];
    }

    // Parse a human-readable file size from an activity message string.
    // /api/status activities have no size field — we attempt to extract a trailing
    // size suffix (e.g. "1.2 MB", "512 KB") from the message text.
    // Returns the size string if found, or "—" when unavailable.
    function parseActivitySize(message) {
      const m = (message || '').match(/(\d+(?:\.\d+)?\s*(?:B|KB|MB|GB|TB))\s*$/i);
      return m ? m[1] : '—';
    }

    function renderOverview(snapshot, usedBytes) {
      // Donut arc — ratio math using CIRCUMFERENCE constant
      const ratio = Math.min(usedBytes / TOTAL_BYTES, 1);
      const used  = ratio * CIRCUMFERENCE;
      const free  = CIRCUMFERENCE - used;
      const arc   = document.getElementById('donut-arc');
      if (arc) arc.setAttribute('stroke-dasharray', used.toFixed(1) + ' ' + free.toFixed(1));

      // Free space label inside ring
      const freeBytes = Math.max(TOTAL_BYTES - usedBytes, 0);
      const freeStr   = formatBytes(freeBytes);
      const parts     = freeStr.split(' ');
      const freeVal   = document.getElementById('donut-free-val');
      const freeUnit  = document.getElementById('donut-free-unit');
      if (freeVal)  freeVal.textContent  = parts[0];
      if (freeUnit) freeUnit.textContent = (parts[1] || '') + ' free';

      // Stat: Used
      const statUsed = document.getElementById('stat-used');
      if (statUsed) statUsed.textContent = formatBytes(usedBytes);

      // Stat: Total (static but confirm via JS)
      const statTotal = document.getElementById('stat-total');
      if (statTotal) statTotal.textContent = formatBytes(TOTAL_BYTES);

      // Stat: Sync
      const statSync = document.getElementById('stat-sync');
      if (statSync) {
        const syncing = snapshot && snapshot.syncing;
        statSync.textContent = syncing ? 'Syncing…' : 'Up to date';
        statSync.className = 'stat-value ' + (syncing ? 'sync-busy' : 'sync-ok');
      }

      // Activity feed
      const list = document.getElementById('activity-list');
      if (!list) return;
      const activities = (snapshot && snapshot.activities) || [];
      if (activities.length === 0) {
        list.innerHTML = '<div class="activity-empty">No recent activity</div>';
        return;
      }
      list.innerHTML = activities.slice(0, 20).map(a => {
        const [cls, icon] = activityBadge(a.message || '');
        // Extract filename from message: last path segment or whole message
        const match = (a.message || '').match(/([^\/\s]+\.\w+)\s*(?:\d+(?:\.\d+)?\s*(?:B|KB|MB|GB|TB))?\s*$/i);
        const filename = match ? match[1] : (a.message || 'Activity');
        const when = a.time ? relTime(a.time) : '';
        // Size: /api/status activities have no size field; parse from message or show "—"
        const size = parseActivitySize(a.message || '');
        // NO hex literals — all styling via CSS classes
        return '<div class="activity-row">' +
          '<div class="activity-badge ' + cls + '">' + icon + '</div>' +
          '<div class="activity-filename">' + escapeHtml(filename) + '</div>' +
          '<div class="activity-meta">' +
            '<span>' + escapeHtml(size) + '</span>' +
            '<span>' + escapeHtml(when) + '</span>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    // ---- Extension badge (GLOB-06) ----
    // Returns HTML string for the colored pill. Uses CSS classes only — no hex in this string.
    function extensionBadge(filename) {
      const dot = filename.lastIndexOf('.');
      const ext = dot === -1 ? '' : filename.slice(dot + 1).toLowerCase();
      const MAP = {
        yml: 'ext-green',  yaml: 'ext-green', json: 'ext-green', toml: 'ext-green', xml: 'ext-green',
        md:  'ext-blue',   txt: 'ext-blue',   csv: 'ext-blue',   log: 'ext-blue',
        pdf: 'ext-purple', doc: 'ext-purple', docx: 'ext-purple', ppt: 'ext-purple', pptx: 'ext-purple',
        jpg: 'ext-orange', jpeg: 'ext-orange', png: 'ext-orange', gif: 'ext-orange',
        webp: 'ext-orange', svg: 'ext-orange', ico: 'ext-orange',
        zip: 'ext-red', tar: 'ext-red', gz: 'ext-red', bz2: 'ext-red', '7z': 'ext-red', rar: 'ext-red',
        go:  'ext-teal', py: 'ext-teal', js: 'ext-teal', ts: 'ext-teal',
        sh:  'ext-teal', rs: 'ext-teal', c:  'ext-teal', cpp: 'ext-teal', h: 'ext-teal',
        rb:  'ext-teal', java: 'ext-teal', swift: 'ext-teal', kt: 'ext-teal',
      };
      const cls = MAP[ext] || 'ext-grey';
      // Label: up to 3 chars of extension, or folder icon char
      const label = ext ? ext.slice(0, 3) : '\u25c7';
      return '<span class="ext-badge ' + cls + '" aria-hidden="true">' + escapeHtml(label) + '</span>';
    }

    // ---- Folder icon SVG ----
    // Inline SVG for folder rows. stroke/fill via class, not hex.
    function folderIconSvg() {
      return '<svg class="folder-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>';
    }

    // ---- Folder reconstruction from flat rel_path array (FILE-03) ----
    // Given all files and a currentPath prefix (e.g. '' or 'docs/'), returns:
    //   { folders: [string], files: [fileObj] }
    // Folders are synthetic — derived from path segments beyond currentPath.
    // Files are direct children at currentPath level (no further '/' in remainder).
    function getFilesViewEntries(files, currentPath) {
      const folderSet = Object.create(null);
      const directFiles = [];
      for (const f of files) {
        if (!f.rel_path.startsWith(currentPath)) continue;
        const remainder = f.rel_path.slice(currentPath.length);
        const slash = remainder.indexOf('/');
        if (slash !== -1) {
          folderSet[remainder.slice(0, slash)] = true;
        } else {
          directFiles.push(f);
        }
      }
      const folders = Object.keys(folderSet).sort((a, b) => a.localeCompare(b));
      directFiles.sort((a, b) => {
        // Sort files by filename (last path segment)
        const na = a.rel_path.slice(currentPath.length);
        const nb = b.rel_path.slice(currentPath.length);
        return na.localeCompare(nb);
      });
      return { folders, files: directFiles };
    }

    // ---- Breadcrumb renderer (FILE-01) ----
    // Rebuilds #files-breadcrumb from App.filesPath.
    // Only the Home segment resets App.filesPath — intermediate clicks navigate to that level.
    function renderBreadcrumb() {
      const bc = document.getElementById('files-breadcrumb');
      if (!bc) return;
      const path = App.filesPath; // e.g. '' or 'docs/' or 'docs/2024/'
      const parts = path ? path.split('/').filter(Boolean) : [];

      let html = '<button class="bc-seg" onclick="filesNavTo(\'\')">Home</button>';
      let accumulated = '';
      for (let i = 0; i < parts.length; i++) {
        accumulated += parts[i] + '/';
        html += '<span class="bc-sep">/</span>';
        if (i < parts.length - 1) {
          // Intermediate: clickable to navigate to that level
          const target = accumulated; // captured for closure via data attribute
          html += '<button class="bc-seg" onclick="filesNavTo(\'' + escapeHtml(target) + '\')">' + escapeHtml(parts[i]) + '</button>';
        } else {
          // Current segment: not clickable
          html += '<span class="bc-cur">' + escapeHtml(parts[i]) + '</span>';
        }
      }
      bc.innerHTML = html;
    }

    // ---- Navigate to a path in the Files view ----
    // path: '' = root, 'docs/' = docs folder, 'docs/2024/' = nested
    // Only call this from user interaction (folder click, breadcrumb click).
    // Do NOT call from data refresh — refreshes must preserve App.filesPath.
    function filesNavTo(path) {
      App.filesPath = path;
      renderBreadcrumb();
      renderFilesTable();
    }

    // ---- Files table renderer (FILE-02, FILE-03) ----
    // Reads from App.cachedFilesViewData (set by loadFilesViewData).
    // Renders folder rows first (FILE-03), then file rows.
    // Sync dot rendered as amber placeholder here; Plan 02 replaces with real computation.
    function renderFilesTable() {
      const tbody = document.getElementById('files-tbody');
      if (!tbody) return;
      // Toggle bulk-active class on the table for bulk mode CSS (row highlight, hide actions)
      const localTable = document.querySelector('#view-local .files-table');
      if (localTable) localTable.classList.toggle('bulk-active', App.bulkMode.localActive);
      const allFiles = App.cachedFilesViewData || [];
      const { folders, files } = getFilesViewEntries(allFiles, App.filesPath);

      if (folders.length === 0 && files.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-muted)">This folder is empty</td></tr>';
        return;
      }

      let html = '';

      // Folder rows first (FILE-03): Modified and Size show em dash
      for (const folderName of folders) {
        const fullFolderPath = App.filesPath + folderName + '/';
        html += '<tr class="row-folder" onclick="filesNavTo(\'' + escapeHtml(fullFolderPath) + '\')">' +
          '<td><div class="td-name">' + folderIconSvg() + '<span class="td-name-text">' + escapeHtml(folderName) + '</span></div></td>' +
          '<td class="td-muted">\u2014</td>' +
          '<td class="td-muted">\u2014</td>' +
          '<td></td>' +
          '<td></td>' +
          '</tr>';
      }

      // File rows
      for (const f of files) {
        const name = f.rel_path.slice(App.filesPath.length);
        // Modified: /api/files/client and /api/files/server do not return a modified time field.
        // Show em dash until Phase 3 or a future API addition provides it.
        const modified = f.modified ? formatModified(f.modified) : '\u2014';
        const size = f.size_human || formatBytes(f.size || 0);
        // Sync dot: real sync status from both maps (FILE-06)
        const status = computeSyncStatus(f.rel_path, App.cachedClientMap || {}, App.cachedServerMap || {});
        const dotHtml = '<span class="sync-dot ' + status + '"></span>';
        html += '<tr data-path="' + escapeHtml(f.rel_path) + '" onclick="handleRowTap(\'local\', \'' + escapeHtml(f.rel_path).replace(/'/g, '&#39;') + '\', event)">' +
          '<td><div class="td-name">' + extensionBadge(name) + '<span class="td-name-text" title="' + escapeHtml(f.rel_path) + '">' + escapeHtml(name) + '</span></div></td>' +
          '<td class="td-muted td-mono">' + modified + '</td>' +
          '<td class="td-muted td-mono">' + escapeHtml(size) + '</td>' +
          '<td>' + dotHtml + '</td>' +
          '<td><div class="row-actions">' +
            '<button class="action-btn" onclick="pushFile(\'' + escapeHtml(f.rel_path).replace(/'/g, '&#39;') + '\')" title="Push to server">Push</button>' +
            '<button class="action-btn danger" onclick="deleteLocalFile(\'' + escapeHtml(f.rel_path).replace(/'/g, '&#39;') + '\')" title="Delete local file">Delete</button>' +
          '</div></td>' +
          '</tr>';
      }

      tbody.innerHTML = html;
      // Re-apply selected class from Set after innerHTML rebuild (prevents stale state on re-render)
      if (App.bulkMode.localActive) {
        tbody.querySelectorAll('tr[data-path]').forEach(row => {
          if (App.bulkMode.localSelected.has(row.dataset.path)) {
            row.classList.add('row-selected');
          }
        });
        updateBulkBar('local');
      }
      renderFilesFooter();
    }

    // ---- Format modified date ----
    // API does not currently return a modified field; this is defensive future-proofing.
    function formatModified(isoString) {
      if (!isoString) return '\u2014';
      const d = new Date(isoString);
      if (isNaN(d.getTime())) return '\u2014';
      return d.toLocaleString([], { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    // ---- Safe path encoding (FILE-03, special chars) ----
    // Encodes each segment of a rel_path individually so spaces, ampersands,
    // and non-ASCII characters do not break fetch() URL construction.
    // Example: "photos/île de ré/img.jpg" → "photos/%C3%AEle%20de%20r%C3%A9/img.jpg"
    function safeEncodePath(relPath) {
      return relPath.split('/').map(encodeURIComponent).join('/');
    }

    // ---- Sync status computation (FILE-06) ----
    // Returns 'synced' if relPath exists in both cachedServerMap and cachedClientMap
    // with identical hash values. Returns 'amber' for all other cases.
    // cachedServerMap: { [rel_path]: { hash, ... } } built from /api/files/server
    // cachedClientMap: { [rel_path]: { hash, ... } } built from /api/files/client
    function computeSyncStatus(relPath, cachedClientMap, cachedServerMap) {
      const inClient = Object.prototype.hasOwnProperty.call(cachedClientMap, relPath);
      const inServer = Object.prototype.hasOwnProperty.call(cachedServerMap, relPath);
      if (inClient && inServer && cachedClientMap[relPath].hash === cachedServerMap[relPath].hash) {
        return 'synced';
      }
      return 'amber';
    }

    // ---- Footer renderer (FILE-05) ----
    // Shows item count + total size for the CURRENT directory level (not all files).
    // Only counts direct children visible in the current path (folders + files at this level).
    // Upload and New Folder buttons are non-functional stubs in v1.
    function renderFilesFooter() {
      const footer = document.getElementById('files-footer');
      if (!footer) return;
      const allFiles = App.cachedFilesViewData || [];
      const { folders, files } = getFilesViewEntries(allFiles, App.filesPath);

      const itemCount = folders.length + files.length;
      const totalBytes = files.reduce((acc, f) => acc + (f.size || 0), 0);

      const countLabel = itemCount === 1 ? '1 item' : itemCount + ' items';
      const sizeLabel = files.length > 0 ? ' \u2014 ' + formatBytes(totalBytes) : '';

      footer.innerHTML =
        '<span class="footer-summary">' + escapeHtml(countLabel + sizeLabel) + '</span>' +
        '<div class="footer-actions">' +
          '<button class="footer-btn" title="Upload file (v2)" onclick="void(0)">Upload</button>' +
          '<button class="footer-btn" title="New folder (v2)" onclick="void(0)">New Folder</button>' +
        '</div>';
    }

    // ---- Load Files view data and render ----
    // Stores all files from /api/files/client into App.cachedFilesViewData.
    // Does NOT reset App.filesPath — navigation state is preserved across refreshes.
    // Called on page load and from the Refresh button.
    // App.cachedServerMap is NOT updated here — it is populated lazily by loadServerViewData()
    // when the user visits the Server tab. Sync dots start amber and become synced once the
    // user loads the Server view at least once.
    function loadFilesViewData(clientFiles) {
      App.cachedFilesViewData = clientFiles || [];
      // Build lookup map keyed by rel_path for O(1) sync status checks
      App.cachedClientMap = Object.create(null);
      for (const f of App.cachedFilesViewData) App.cachedClientMap[f.rel_path] = f;
      renderBreadcrumb();
      renderFilesTable(); // renderFilesTable now calls renderFilesFooter() at the end
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── On-demand data fetch ─────────────────────────────────────────────────────

    function showErrorBanner(msg) {
      const banner = document.getElementById('error-banner');
      if (!banner) return;
      banner.textContent = msg || 'Server unreachable \u2014 retrying\u2026';
      banner.style.display = '';
    }

    function hideErrorBanner() {
      const banner = document.getElementById('error-banner');
      if (!banner) return;
      banner.style.display = 'none';
    }

    // ---- Server sync-status computation (SERV-03, SERV-04) ----
    // Three states: 'synced' (on server + locally with matching hash),
    // 'amber' (on server + locally with differing hash),
    // 'server-only' (on server, not found locally).
    function computeServerSyncStatus(relPath) {
      const clientEntry = Object.prototype.hasOwnProperty.call(App.cachedClientMap, relPath)
        ? App.cachedClientMap[relPath] : null;
      const serverEntry = App.cachedServerMap[relPath];
      if (!clientEntry) return 'server-only';
      if (clientEntry.hash === serverEntry.hash) return 'synced';
      return 'amber';
    }

    // ---- Server view breadcrumb renderer ----
    // Mirrors renderBreadcrumb() but reads App.serverPath and calls serverNavTo().
    function renderServerBreadcrumb() {
      const bc = document.getElementById('server-breadcrumb');
      if (!bc) return;
      const path = App.serverPath;
      const parts = path ? path.split('/').filter(Boolean) : [];

      let html = '<button class="bc-seg" onclick="serverNavTo(\'\')">Home</button>';
      let accumulated = '';
      for (let i = 0; i < parts.length; i++) {
        accumulated += parts[i] + '/';
        html += '<span class="bc-sep">/</span>';
        if (i < parts.length - 1) {
          const target = accumulated;
          html += '<button class="bc-seg" onclick="serverNavTo(\'' + escapeHtml(target) + '\')">' + escapeHtml(parts[i]) + '</button>';
        } else {
          html += '<span class="bc-cur">' + escapeHtml(parts[i]) + '</span>';
        }
      }
      bc.innerHTML = html;
    }

    // ---- Navigate to a path in the Server view ----
    // Mirrors filesNavTo() but for App.serverPath. Only called from user interaction.
    function serverNavTo(path) {
      App.serverPath = path;
      renderServerBreadcrumb();
      renderServerTable();
    }

    // ---- Server table renderer (SERV-01, SERV-03, SERV-04, SERV-07) ----
    function renderServerTable() {
      const tbody = document.getElementById('server-tbody');
      if (!tbody) return;
      const serverTable = document.querySelector('#view-server .files-table');
      if (serverTable) serverTable.classList.toggle('bulk-active', App.bulkMode.serverActive);
      const allFiles = App.cachedServerFiles || [];
      const { folders, files } = getFilesViewEntries(allFiles, App.serverPath);

      if (folders.length === 0 && files.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:32px;color:var(--text-muted)">This folder is empty</td></tr>';
        renderServerFooter();
        return;
      }

      let html = '';

      // Folder rows first
      for (const folderName of folders) {
        const fullFolderPath = App.serverPath + folderName + '/';
        html += '<tr class="row-folder" onclick="serverNavTo(\'' + escapeHtml(fullFolderPath) + '\')">' +
          '<td><div class="td-name">' + folderIconSvg() + '<span class="td-name-text">' + escapeHtml(folderName) + '</span></div></td>' +
          '<td class="td-muted">\u2014</td>' +
          '<td></td>' +
          '<td></td>' +
          '</tr>';
      }

      // File rows
      for (const f of files) {
        const name = f.rel_path.slice(App.serverPath.length);
        const size = f.size_human || formatBytes(f.size || 0);
        const status = computeServerSyncStatus(f.rel_path);
        const dotHtml = '<span class="sync-dot ' + status + '"></span>';
        // Status label alongside dot for screen reader context
        const statusLabel = status === 'synced' ? 'Synced' : (status === 'amber' ? 'Modified' : 'Server only');
        html += '<tr data-path="' + escapeHtml(f.rel_path) + '" onclick="handleRowTap(\'server\', \'' + escapeHtml(f.rel_path).replace(/'/g, '&#39;') + '\', event)">' +
          '<td><div class="td-name">' + extensionBadge(name) + '<span class="td-name-text" title="' + escapeHtml(f.rel_path) + '">' + escapeHtml(name) + '</span></div></td>' +
          '<td class="td-muted td-mono">' + escapeHtml(size) + '</td>' +
          '<td><span style="display:flex;align-items:center;gap:6px">' + dotHtml + '<span class="td-muted" style="font-size:12px">' + statusLabel + '</span></span></td>' +
          '<td><div class="row-actions">' +
            '<button class="action-btn" onclick="pullFile(\'' + escapeHtml(f.rel_path).replace(/'/g, '&#39;') + '\')" title="Pull to local machine">Pull</button>' +
            '<button class="action-btn danger" onclick="deleteServerFile(\'' + escapeHtml(f.rel_path).replace(/'/g, '&#39;') + '\')" title="Remove from server">Delete</button>' +
          '</div></td>' +
          '</tr>';
      }

      tbody.innerHTML = html;
      if (App.bulkMode.serverActive) {
        tbody.querySelectorAll('tr[data-path]').forEach(row => {
          if (App.bulkMode.serverSelected.has(row.dataset.path)) {
            row.classList.add('row-selected');
          }
        });
        updateBulkBar('server');
      }
      renderServerFooter();
    }

    // ---- Server footer renderer (SERV-08) ----
    function renderServerFooter() {
      const footer = document.getElementById('server-footer');
      if (!footer) return;
      const allFiles = App.cachedServerFiles || [];
      const { folders, files } = getFilesViewEntries(allFiles, App.serverPath);

      const itemCount = folders.length + files.length;
      const totalBytes = files.reduce((acc, f) => acc + (f.size || 0), 0);

      const countLabel = itemCount === 1 ? '1 item' : itemCount + ' items';
      const sizeLabel = files.length > 0 ? ' \u2014 ' + formatBytes(totalBytes) : '';

      footer.innerHTML = '<span class="footer-summary">Server total: ' + escapeHtml(countLabel + sizeLabel) + '</span>';
    }

    // ---- Load Server view data on demand (SERV-01, SERV-02) ----
    // ONLY called from the Refresh button in the Server tab.
    // NEVER called from refreshData() — server fetch is always user-initiated.
    async function loadServerViewData() {
      const tbody = document.getElementById('server-tbody');
      if (tbody) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:32px;color:var(--text-muted)">Loading\u2026</td></tr>';
      }
      try {
        const res = await fetch('/api/files/server');
        if (!res.ok) throw new Error('non-2xx');
        const data = await res.json();
        App.cachedServerFiles = data.files || [];
        App.cachedServerMap = Object.create(null);
        for (const f of App.cachedServerFiles) App.cachedServerMap[f.rel_path] = f;
        App.serverLoaded = true;
        hideErrorBanner();
        renderServerBreadcrumb();
        renderServerTable();
      } catch (_) {
        showErrorBanner('Failed to load server files \u2014 click Refresh to retry');
        if (tbody) {
          tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:32px;color:var(--text-muted)">Failed to load. Click Refresh to retry.</td></tr>';
        }
      }
    }

    // ---- Bulk selection state management (BULK-03, BULK-04) ----

    // Called when clicking anywhere on a file row in bulk mode (BULK-10).
    // Toggles the row highlight using CSS class — no checkboxes.
    function handleRowTap(view, relPath, event) {
      // Only act when bulk mode is active
      if (!App.bulkMode[view + 'Active']) return;
      // Don't fire on action buttons
      if (event.target.closest('.row-actions')) return;
      const tbodyId = view === 'local' ? 'files-tbody' : 'server-tbody';
      const row = document.querySelector('#' + tbodyId + ' tr[data-path="' + CSS.escape(relPath) + '"]');
      if (!row) return;
      const sel = App.bulkMode[view + 'Selected'];
      if (sel.has(relPath)) {
        sel.delete(relPath);
        row.classList.remove('row-selected');
      } else {
        sel.add(relPath);
        row.classList.add('row-selected');
      }
      updateBulkBar(view);
    }

    // Selects or deselects all visible file rows in bulk mode.
    // Toggles: if all rows are selected, deselects all; otherwise selects all.
    function selectAllFiles(view) {
      const tbodyId = view === 'local' ? 'files-tbody' : 'server-tbody';
      const sel = App.bulkMode[view + 'Selected'];
      const rows = document.querySelectorAll('#' + tbodyId + ' tr[data-path]');
      const allSelected = rows.length > 0 && sel.size === rows.length;
      if (allSelected) {
        // Deselect all
        sel.clear();
        rows.forEach(r => r.classList.remove('row-selected'));
      } else {
        // Select all
        rows.forEach(r => {
          sel.add(r.dataset.path);
          r.classList.add('row-selected');
        });
      }
      updateBulkBar(view);
    }

    // Shows or hides the bulk action bar and updates the count label.
    // Called after any selection change.
    function updateBulkBar(view) {
      const bar     = document.getElementById(view + '-bulk-bar');
      const countEl = document.getElementById(view + '-bulk-count');
      if (!bar) return;
      const sel = App.bulkMode[view + 'Selected'];
      bar.classList.toggle('visible', sel.size > 0);
      if (countEl) countEl.textContent = sel.size + ' selected';
    }

    // ---- Bulk select mode (BULK-01, BULK-02, BULK-09) ----

    function toggleBulkMode(view) {
      if (App.bulkMode[view + 'Active']) {
        clearBulkMode(view);
      } else {
        enterBulkMode(view);
      }
    }

    function enterBulkMode(view) {
      App.bulkMode[view + 'Active'] = true;
      App.bulkMode[view + 'Selected'].clear();
      if (view === 'local') renderFilesTable();
      else                  renderServerTable();
    }

    function clearBulkMode(view) {
      App.bulkMode[view + 'Active'] = false;
      App.bulkMode[view + 'Selected'].clear();
      // Re-enable the Select button
      const selectBtn = document.getElementById(view + '-select-btn');
      if (selectBtn) { selectBtn.disabled = false; selectBtn.style.opacity = ''; }
      // Hide bulk bar
      const bar = document.getElementById(view + '-bulk-bar');
      if (bar) bar.classList.remove('visible');
      // Remove bulk-active class from table and clear any row-selected highlights
      const table = document.querySelector(
        view === 'local' ? '#view-local .files-table' : '#view-server .files-table'
      );
      if (table) {
        table.classList.remove('bulk-active');
        table.querySelectorAll('tr.row-selected').forEach(r => r.classList.remove('row-selected'));
      }
    }

    // ---- Local file actions (LOCAL-03, LOCAL-04) ----

    async function pushFile(relPath) {
      try {
        const res = await fetch('/api/files/upload?path=' + encodeURIComponent(relPath), {
          method: 'POST',
        });
        if (!res.ok) throw new Error('upload failed: ' + res.status);
        // Re-fetch both client and server maps so sync dot updates correctly
        await refreshData();
        // If server data was previously loaded, refresh it too so server view stays consistent
        if (App.serverLoaded) await loadServerViewData();
        // Re-render local table now that cachedServerMap is fresh — dots will compute correctly
        renderFilesTable();
      } catch (err) {
        showErrorBanner('Push failed: ' + err.message);
      }
    }

    async function deleteLocalFile(relPath) {
      if (!confirm('Delete "' + relPath + '" from your local machine?\nThis cannot be undone.')) return;
      try {
        const res = await fetch('/api/files/client?path=' + encodeURIComponent(relPath), {
          method: 'DELETE',
        });
        if (!res.ok) throw new Error('delete failed: ' + res.status);
        await refreshData();
      } catch (err) {
        showErrorBanner('Delete failed: ' + err.message);
      }
    }

    // ---- Server file actions (SERV-05, SERV-06) ----

    async function pullFile(relPath) {
      try {
        const res = await fetch('/api/files/download?path=' + encodeURIComponent(relPath), {
          method: 'POST',
        });
        if (!res.ok) throw new Error('download failed: ' + res.status);
        // Refresh local view so the newly pulled file appears and sync dots update
        await refreshData();
      } catch (err) {
        showErrorBanner('Pull failed: ' + err.message);
      }
    }

    async function deleteServerFile(relPath) {
      if (!confirm('Remove "' + relPath + '" from the server?\nThis cannot be undone.')) return;
      try {
        const res = await fetch('/api/files/server?path=' + encodeURIComponent(relPath), {
          method: 'DELETE',
        });
        if (!res.ok) throw new Error('delete failed: ' + res.status);
        // Re-fetch server files so removed file disappears from server table
        await loadServerViewData();
        // Also refresh local view so sync dots update (file no longer on server)
        await refreshData();
      } catch (err) {
        showErrorBanner('Server delete failed: ' + err.message);
      }
    }

    // ---- Bulk operations (BULK-05, BULK-06, BULK-07, BULK-08) ----
    // All bulk ops use sequential await (not Promise.all) because the server
    // uses sync.Mutex on all mutating handlers — parallel fetches queue anyway.

    async function bulkPush() {
      const paths = [...App.bulkMode.localSelected];
      if (paths.length === 0) return;
      for (const relPath of paths) {
        try {
          const res = await fetch('/api/files/upload?path=' + encodeURIComponent(relPath), { method: 'POST' });
          if (!res.ok) throw new Error('upload failed: ' + res.status);
        } catch (err) {
          showErrorBanner('Bulk push stopped at "' + relPath + '": ' + err.message);
          break;
        }
      }
      clearBulkMode('local');
      await refreshData();
      if (App.serverLoaded) await loadServerViewData();
      renderFilesTable();
    }

    async function bulkPull() {
      const paths = [...App.bulkMode.serverSelected];
      if (paths.length === 0) return;
      for (const relPath of paths) {
        try {
          const res = await fetch('/api/files/download?path=' + encodeURIComponent(relPath), { method: 'POST' });
          if (!res.ok) throw new Error('download failed: ' + res.status);
        } catch (err) {
          showErrorBanner('Bulk pull stopped at "' + relPath + '": ' + err.message);
          break;
        }
      }
      clearBulkMode('server');
      await refreshData();
      if (App.serverLoaded) await loadServerViewData();
      renderFilesTable();
    }

    async function bulkDeleteLocal() {
      const paths = [...App.bulkMode.localSelected];
      if (paths.length === 0) return;
      if (!confirm('Delete ' + paths.length + ' file(s) from your local machine?\nThis cannot be undone.')) return;
      for (const relPath of paths) {
        try {
          const res = await fetch('/api/files/client?path=' + encodeURIComponent(relPath), { method: 'DELETE' });
          if (!res.ok) throw new Error('delete failed: ' + res.status);
        } catch (err) {
          showErrorBanner('Bulk delete stopped at "' + relPath + '": ' + err.message);
          break;
        }
      }
      clearBulkMode('local');
      await refreshData();
    }

    async function bulkDeleteServer() {
      const paths = [...App.bulkMode.serverSelected];
      if (paths.length === 0) return;
      if (!confirm('Remove ' + paths.length + ' file(s) from the server?\nThis cannot be undone.')) return;
      for (const relPath of paths) {
        try {
          const res = await fetch('/api/files/server?path=' + encodeURIComponent(relPath), { method: 'DELETE' });
          if (!res.ok) throw new Error('delete failed: ' + res.status);
        } catch (err) {
          showErrorBanner('Bulk delete stopped at "' + relPath + '": ' + err.message);
          break;
        }
      }
      clearBulkMode('server');
      await loadServerViewData();
      await refreshData();
    }

    async function refreshData() {
      try {
        const [statusRes, clientRes] = await Promise.all([
          fetch('/api/status'),
          fetch('/api/files/client'),
        ]);
        if (!statusRes.ok || !clientRes.ok) throw new Error('non-2xx');
        const [snapshot, clientData] = await Promise.all([
          statusRes.json(),
          clientRes.json(),
        ]);
        const clientFiles = clientData.files || [];
        // usedBytes: use cached server map if available, else 0
        const usedBytes = Object.values(App.cachedServerMap).reduce((acc, f) => acc + (f.size || 0), 0);
        hideErrorBanner();
        renderOverview(snapshot, usedBytes);
        loadFilesViewData(clientFiles);
      } catch (_) {
        showErrorBanner('Server unreachable \u2014 click Refresh to retry');
      }
    }

    async function triggerSync() {
      const btn = document.getElementById('btn-force-sync');
      if (btn) btn.disabled = true;
      try {
        await fetch('/api/force-sync', { method: 'POST' });
        const statSync = document.getElementById('stat-sync');
        if (statSync) {
          statSync.textContent = 'Syncing\u2026';
          statSync.className = 'stat-value sync-busy';
        }
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    // Boot: fetch data once on page load.
    refreshData();
  </script>
</body>
</html>
