<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myDrive</title>
  <style>
    :root {
      --bg-base:        #f5f5f7;
      --bg-surface:     #ffffff;
      --bg-header:      #ffffff;
      --border:         rgba(0,0,0,0.08);
      --border-width:   0.5px;
      --text-primary:   #1d1d1f;
      --text-secondary: #6e6e73;
      --text-muted:     #aeaeb2;
      --accent:         #0071e3;
      --accent-hover:   #0077ed;
      --accent-text:    #ffffff;
      --success:        #34c759;
      --warn:           #ff9f0a;
      --danger:         #ff3b30;
      --font:           -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius-sm:      4px;
      --radius-md:      6px;
      --radius-lg:      8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-base:        #000000;
        --bg-surface:     #1c1c1e;
        --bg-header:      #1c1c1e;
        --border:         rgba(255,255,255,0.10);
        --text-primary:   #f5f5f7;
        --text-secondary: #98989d;
        --text-muted:     #636366;
        --accent:         #0a84ff;
        --accent-hover:   #409cff;
        --accent-text:    #ffffff;
        --success:        #30d158;
        --warn:           #ffd60a;
        --danger:         #ff453a;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    /* NO box-shadow, NO gradient anywhere — GLOB-07 flat aesthetic */
    /* Borders use var(--border) at var(--border-width) (0.5px) */

    #app-header {
      background: var(--bg-header);
      border-bottom: var(--border-width) solid var(--border);
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .nav-tabs { display: flex; gap: 0; margin-left: auto; }
    .tab {
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      user-select: none;
    }
    .tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent);
    }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--accent-text);
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 16px;
    }
    #app-main { flex: 1; overflow-y: auto; }

    /* Overview layout */
    #view-overview {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* Donut chart */
    .donut-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .donut-svg { transform: rotate(-90deg); }
    .donut-track {
      fill: none;
      stroke: var(--border);
      stroke-width: 18;
    }
    .donut-used {
      fill: none;
      stroke: var(--accent);
      stroke-width: 18;
      stroke-linecap: round;
      transition: stroke-dasharray 0.6s ease;
    }
    .donut-label {
      position: absolute;
      text-align: center;
      pointer-events: none;
    }
    .donut-free-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.1;
    }
    .donut-free-unit {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Stat cards */
    .stat-cards {
      display: flex;
      gap: 12px;
      width: 100%;
      justify-content: center;
    }
    .stat-card {
      flex: 1;
      background: var(--bg-surface);
      border: var(--border-width) solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      min-width: 0;
    }
    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .stat-value.sync-ok   { color: var(--success); }
    .stat-value.sync-busy { color: var(--warn); }

    /* Activity feed */
    .activity-section { width: 100%; }
    .activity-heading {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .activity-list {
      background: var(--bg-surface);
      border: var(--border-width) solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .activity-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: var(--border-width) solid var(--border);
      font-size: 13px;
    }
    .activity-row:last-child { border-bottom: none; }
    .activity-badge {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-up   { background: var(--accent);   color: var(--accent-text); }
    .badge-down { background: var(--success);  color: #fff; }
    .badge-del  { background: var(--danger);   color: #fff; }
    .badge-sync { background: var(--warn);     color: #fff; }
    .activity-filename {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-primary);
    }
    .activity-meta {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* Browse button */
    .browse-btn {
      background: transparent;
      border: var(--border-width) solid var(--accent);
      color: var(--accent);
      border-radius: var(--radius-md);
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
      font-family: var(--font);
    }
    .browse-btn:hover { background: var(--accent); color: var(--accent-text); }

    /* Empty state */
    .activity-empty {
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ---- Files view ---- */
    #view-files {
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Breadcrumb path bar (FILE-01) */
    #files-breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      font-size: 13px;
      margin-bottom: 12px;
      color: var(--text-secondary);
    }
    .bc-seg {
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font: inherit;
      font-size: 13px;
    }
    .bc-seg:hover { text-decoration: underline; }
    .bc-cur { color: var(--text-primary); font-weight: 500; }
    .bc-sep { color: var(--text-muted); }

    /* Table container (FILE-04) */
    .files-table-wrap {
      background: var(--bg-surface);
      border: var(--border-width) solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    /* Table (FILE-02) */
    .files-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .files-table thead th {
      text-align: left;
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: var(--border-width) solid var(--border);
      background: var(--bg-surface);
    }
    .files-table tbody tr {
      border-bottom: var(--border-width) solid var(--border);
      transition: background 0.1s;
      cursor: default;
    }
    .files-table tbody tr:last-child { border-bottom: none; }
    .files-table tbody tr:hover { background: var(--bg-base); } /* FILE-04 hover highlight */
    .files-table tbody tr.row-folder { cursor: pointer; }
    .files-table td {
      padding: 9px 14px;
      color: var(--text-primary);
      white-space: nowrap;
    }
    .td-name {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      max-width: 400px;
      overflow: hidden;
    }
    .td-name-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .td-muted { color: var(--text-secondary); }
    .td-mono  { font-variant-numeric: tabular-nums; }

    /* Extension badges (GLOB-06) */
    .ext-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 28px;
      height: 20px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    /* Palette — all via CSS variables or hardcoded only inside <style>, never in JS strings */
    .ext-green  { background: #d1fae5; color: #065f46; } /* yml, yaml, json, toml */
    .ext-blue   { background: #dbeafe; color: #1e40af; } /* md, txt, csv */
    .ext-purple { background: #ede9fe; color: #5b21b6; } /* pdf, doc, docx */
    .ext-orange { background: #ffedd5; color: #9a3412; } /* jpg, jpeg, png, gif, webp, svg */
    .ext-red    { background: #fee2e2; color: #991b1b; } /* zip, tar, gz, bz2, 7z */
    .ext-teal   { background: #ccfbf1; color: #115e59; } /* go, py, js, ts, sh, rs, c, cpp, h */
    .ext-grey   { background: var(--bg-base); color: var(--text-muted); border: var(--border-width) solid var(--border); } /* unknown */

    /* Dark-mode-safe badge overrides */
    @media (prefers-color-scheme: dark) {
      .ext-green  { background: #064e3b; color: #6ee7b7; }
      .ext-blue   { background: #1e3a5f; color: #93c5fd; }
      .ext-purple { background: #2d1b69; color: #c4b5fd; }
      .ext-orange { background: #431407; color: #fdba74; }
      .ext-red    { background: #450a0a; color: #fca5a5; }
      .ext-teal   { background: #134e4a; color: #5eead4; }
    }

    /* Folder icon color */
    .folder-icon { color: var(--accent); flex-shrink: 0; }

    /* Sync status dots (FILE-06) — rendered by Plan 02 */
    .sync-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sync-dot.synced { background: var(--success); }
    .sync-dot.amber  { background: var(--warn); }
  </style>
</head>
<body>
  <header id="app-header">
    <div class="brand">
      <!-- Triangle logo SVG: equilateral triangle, fill=var(--accent), 20x20 -->
      <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
        <polygon points="10,2 18,18 2,18" fill="var(--accent)"/>
      </svg>
      <span class="brand-name">myDrive</span>
    </div>
    <nav class="nav-tabs" id="nav-tabs">
      <div class="tab active" data-tab="overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" data-tab="files" onclick="switchTab('files')">Files</div>
    </nav>
    <div class="avatar" id="user-avatar">MD</div>
  </header>
  <main id="app-main">
    <div id="view-overview">
      <!-- Donut chart -->
      <div class="donut-wrap">
        <svg class="donut-svg" width="200" height="200" viewBox="0 0 200 200" aria-label="Storage usage">
          <circle class="donut-track" cx="100" cy="100" r="82"/>
          <circle class="donut-used" id="donut-arc" cx="100" cy="100" r="82"
                  stroke-dasharray="0 516" stroke-dashoffset="0"/>
        </svg>
        <div class="donut-label">
          <div class="donut-free-value" id="donut-free-val">—</div>
          <div class="donut-free-unit" id="donut-free-unit">free</div>
        </div>
      </div>

      <!-- Stat cards -->
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-label">Used</div>
          <div class="stat-value" id="stat-used">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div class="stat-value" id="stat-total">250 GB</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Sync</div>
          <div class="stat-value sync-ok" id="stat-sync">—</div>
        </div>
      </div>

      <!-- Activity feed -->
      <div class="activity-section">
        <div class="activity-heading">Recent activity</div>
        <div class="activity-list" id="activity-list">
          <div class="activity-empty">No recent activity</div>
        </div>
      </div>

      <!-- Browse files button -->
      <button class="browse-btn" onclick="switchTab('files')">Browse files ↗</button>
    </div>
    <div id="view-files" style="display:none"><!-- Files content: Phase 2 --></div>
  </main>

  <script>
    const TOTAL_BYTES = 250 * 1024 ** 3; // 250 GB cap — hardcoded per GLOB-05

    const App = {
      activeTab: 'overview',
      filesPath: '',  // only reset on explicit Home breadcrumb click
    };

    function switchTab(tab) {
      App.activeTab = tab;
      document.querySelectorAll('.tab').forEach(el => {
        el.classList.toggle('active', el.dataset.tab === tab);
      });
      document.getElementById('view-overview').style.display = tab === 'overview' ? '' : 'none';
      document.getElementById('view-files').style.display   = tab === 'files'    ? '' : 'none';
    }

    const CIRCUMFERENCE = 2 * Math.PI * 82; // r=82 matches SVG circle

    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      const v = bytes / Math.pow(1024, i);
      return (i === 0 ? v.toFixed(0) : v.toFixed(1)) + ' ' + units[i];
    }

    function relTime(isoString) {
      const diff = Math.floor((Date.now() - new Date(isoString)) / 1000);
      if (diff < 60)  return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
      if (diff < 86400) return Math.floor(diff / 3600) + ' hr ago';
      return Math.floor(diff / 86400) + ' d ago';
    }

    function activityBadge(message) {
      // Classify from message text; return CSS class and short label
      const m = message.toLowerCase();
      if (m.includes('upload') || m.includes('push') || m.includes('sent')) return ['badge-up',   '↑'];
      if (m.includes('download') || m.includes('pull') || m.includes('recv')) return ['badge-down', '↓'];
      if (m.includes('delete') || m.includes('removed')) return ['badge-del', '✕'];
      return ['badge-sync', '↻'];
    }

    // Parse a human-readable file size from an activity message string.
    // /api/status activities have no size field — we attempt to extract a trailing
    // size suffix (e.g. "1.2 MB", "512 KB") from the message text.
    // Returns the size string if found, or "—" when unavailable.
    function parseActivitySize(message) {
      const m = (message || '').match(/(\d+(?:\.\d+)?\s*(?:B|KB|MB|GB|TB))\s*$/i);
      return m ? m[1] : '—';
    }

    function renderOverview(snapshot, usedBytes) {
      // Donut arc — ratio math using CIRCUMFERENCE constant
      const ratio = Math.min(usedBytes / TOTAL_BYTES, 1);
      const used  = ratio * CIRCUMFERENCE;
      const free  = CIRCUMFERENCE - used;
      const arc   = document.getElementById('donut-arc');
      if (arc) arc.setAttribute('stroke-dasharray', used.toFixed(1) + ' ' + free.toFixed(1));

      // Free space label inside ring
      const freeBytes = Math.max(TOTAL_BYTES - usedBytes, 0);
      const freeStr   = formatBytes(freeBytes);
      const parts     = freeStr.split(' ');
      const freeVal   = document.getElementById('donut-free-val');
      const freeUnit  = document.getElementById('donut-free-unit');
      if (freeVal)  freeVal.textContent  = parts[0];
      if (freeUnit) freeUnit.textContent = (parts[1] || '') + ' free';

      // Stat: Used
      const statUsed = document.getElementById('stat-used');
      if (statUsed) statUsed.textContent = formatBytes(usedBytes);

      // Stat: Total (static but confirm via JS)
      const statTotal = document.getElementById('stat-total');
      if (statTotal) statTotal.textContent = formatBytes(TOTAL_BYTES);

      // Stat: Sync
      const statSync = document.getElementById('stat-sync');
      if (statSync) {
        const syncing = snapshot && snapshot.syncing;
        statSync.textContent = syncing ? 'Syncing…' : 'Up to date';
        statSync.className = 'stat-value ' + (syncing ? 'sync-busy' : 'sync-ok');
      }

      // Activity feed
      const list = document.getElementById('activity-list');
      if (!list) return;
      const activities = (snapshot && snapshot.activities) || [];
      if (activities.length === 0) {
        list.innerHTML = '<div class="activity-empty">No recent activity</div>';
        return;
      }
      list.innerHTML = activities.slice(0, 20).map(a => {
        const [cls, icon] = activityBadge(a.message || '');
        // Extract filename from message: last path segment or whole message
        const match = (a.message || '').match(/([^\/\s]+\.\w+)\s*(?:\d+(?:\.\d+)?\s*(?:B|KB|MB|GB|TB))?\s*$/i);
        const filename = match ? match[1] : (a.message || 'Activity');
        const when = a.time ? relTime(a.time) : '';
        // Size: /api/status activities have no size field; parse from message or show "—"
        const size = parseActivitySize(a.message || '');
        // NO hex literals — all styling via CSS classes
        return '<div class="activity-row">' +
          '<div class="activity-badge ' + cls + '">' + icon + '</div>' +
          '<div class="activity-filename">' + escapeHtml(filename) + '</div>' +
          '<div class="activity-meta">' +
            '<span>' + escapeHtml(size) + '</span>' +
            '<span>' + escapeHtml(when) + '</span>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Fixture files array — usedBytes derived via .reduce() to establish GLOB-05 pattern for Phase 3
    // (Phase 3 will replace this with files.reduce() over live /api/files/server response)
    const FIXTURE_FILES = [
      { rel_path: 'notes/meeting.md',    size: 4096 },
      { rel_path: 'photos/img001.jpg',   size: 3_200_000 },
      { rel_path: 'backup/db.sqlite',    size: 512_000_000 },
      { rel_path: 'docs/report.pdf',     size: 2_100_000 },
      { rel_path: 'videos/demo.mp4',     size: 18_000_000_000 - 515_716_096 }, // fills to ~18.4 GB total
    ];
    const FIXTURE_USED_BYTES = FIXTURE_FILES.reduce((acc, f) => acc + f.size, 0);

    // Fixture status snapshot — used until Phase 3 wires live API poll
    const FIXTURE_SNAPSHOT = {
      connected: true,
      syncing: false,
      last_sync_time: new Date(Date.now() - 7200000).toISOString(),
      total_files: 42,
      total_size: 0,
      activities: [
        { time: new Date(Date.now() - 600000).toISOString(),   message: 'Uploaded notes/meeting.md 4 KB' },
        { time: new Date(Date.now() - 3600000).toISOString(),  message: 'Uploaded photos/img001.jpg 3.1 MB' },
        { time: new Date(Date.now() - 7200000).toISOString(),  message: 'Downloaded backup/db.sqlite 512 MB' },
        { time: new Date(Date.now() - 86400000).toISOString(), message: 'Deleted tmp/scratch.txt' },
      ],
    };

    // Boot: render overview with fixture data immediately
    renderOverview(FIXTURE_SNAPSHOT, FIXTURE_USED_BYTES);
  </script>
</body>
</html>
