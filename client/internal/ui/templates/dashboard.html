<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myDrive</title>
  <style>
    :root {
      --bg-base:        #f5f5f7;
      --bg-surface:     #ffffff;
      --bg-header:      #ffffff;
      --border:         rgba(0,0,0,0.08);
      --border-width:   0.5px;
      --text-primary:   #1d1d1f;
      --text-secondary: #6e6e73;
      --text-muted:     #aeaeb2;
      --accent:         #0071e3;
      --accent-hover:   #0077ed;
      --accent-text:    #ffffff;
      --success:        #34c759;
      --warn:           #ff9f0a;
      --danger:         #ff3b30;
      --font:           -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius-sm:      4px;
      --radius-md:      6px;
      --radius-lg:      8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-base:        #000000;
        --bg-surface:     #1c1c1e;
        --bg-header:      #1c1c1e;
        --border:         rgba(255,255,255,0.10);
        --text-primary:   #f5f5f7;
        --text-secondary: #98989d;
        --text-muted:     #636366;
        --accent:         #0a84ff;
        --accent-hover:   #409cff;
        --accent-text:    #ffffff;
        --success:        #30d158;
        --warn:           #ffd60a;
        --danger:         #ff453a;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    /* NO box-shadow, NO gradient anywhere — GLOB-07 flat aesthetic */
    /* Borders use var(--border) at var(--border-width) (0.5px) */

    #app-header {
      background: var(--bg-header);
      border-bottom: var(--border-width) solid var(--border);
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 8px; }
    .brand-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .nav-tabs { display: flex; gap: 0; margin-left: auto; }
    .tab {
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      user-select: none;
    }
    .tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent);
    }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--accent-text);
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 16px;
    }
    #app-main { flex: 1; overflow-y: auto; }

    /* Overview layout */
    #view-overview {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* Donut chart */
    .donut-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .donut-svg { transform: rotate(-90deg); }
    .donut-track {
      fill: none;
      stroke: var(--border);
      stroke-width: 18;
    }
    .donut-used {
      fill: none;
      stroke: var(--accent);
      stroke-width: 18;
      stroke-linecap: round;
      transition: stroke-dasharray 0.6s ease;
    }
    .donut-label {
      position: absolute;
      text-align: center;
      pointer-events: none;
    }
    .donut-free-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.1;
    }
    .donut-free-unit {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Stat cards */
    .stat-cards {
      display: flex;
      gap: 12px;
      width: 100%;
      justify-content: center;
    }
    .stat-card {
      flex: 1;
      background: var(--bg-surface);
      border: var(--border-width) solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      min-width: 0;
    }
    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .stat-value.sync-ok   { color: var(--success); }
    .stat-value.sync-busy { color: var(--warn); }

    /* Activity feed */
    .activity-section { width: 100%; }
    .activity-heading {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .activity-list {
      background: var(--bg-surface);
      border: var(--border-width) solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .activity-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: var(--border-width) solid var(--border);
      font-size: 13px;
    }
    .activity-row:last-child { border-bottom: none; }
    .activity-badge {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-up   { background: var(--accent);   color: var(--accent-text); }
    .badge-down { background: var(--success);  color: #fff; }
    .badge-del  { background: var(--danger);   color: #fff; }
    .badge-sync { background: var(--warn);     color: #fff; }
    .activity-filename {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-primary);
    }
    .activity-meta {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* Browse button */
    .browse-btn {
      background: transparent;
      border: var(--border-width) solid var(--accent);
      color: var(--accent);
      border-radius: var(--radius-md);
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
      font-family: var(--font);
    }
    .browse-btn:hover { background: var(--accent); color: var(--accent-text); }

    /* Empty state */
    .activity-empty {
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header id="app-header">
    <div class="brand">
      <!-- Triangle logo SVG: equilateral triangle, fill=var(--accent), 20x20 -->
      <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
        <polygon points="10,2 18,18 2,18" fill="var(--accent)"/>
      </svg>
      <span class="brand-name">myDrive</span>
    </div>
    <nav class="nav-tabs" id="nav-tabs">
      <div class="tab active" data-tab="overview" onclick="switchTab('overview')">Overview</div>
      <div class="tab" data-tab="files" onclick="switchTab('files')">Files</div>
    </nav>
    <div class="avatar" id="user-avatar">MD</div>
  </header>
  <main id="app-main">
    <div id="view-overview"><!-- Overview content: Plan 02 --></div>
    <div id="view-files" style="display:none"><!-- Files content: Phase 2 --></div>
  </main>

  <script>
    const TOTAL_BYTES = 250 * 1024 ** 3; // 250 GB cap — hardcoded per GLOB-05

    const App = {
      activeTab: 'overview',
      filesPath: '',  // only reset on explicit Home breadcrumb click
    };

    function switchTab(tab) {
      App.activeTab = tab;
      document.querySelectorAll('.tab').forEach(el => {
        el.classList.toggle('active', el.dataset.tab === tab);
      });
      document.getElementById('view-overview').style.display = tab === 'overview' ? '' : 'none';
      document.getElementById('view-files').style.display   = tab === 'files'    ? '' : 'none';
    }
  </script>
</body>
</html>
